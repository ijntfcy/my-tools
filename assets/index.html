<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Personal Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #F5F5F2; 
            --card: #FFFFFF; 
            --accent: #8E735B; /* 質感咖啡棕 */
            --gold: #D4AF37;
            --text-main: #3C3C3C;
            --text-sub: #A0A0A0;
            --line: #F1EFEA;
            --shadow-soft: rgba(0, 0, 0, 0.05);
        }
        
        body { 
            background: var(--bg); margin: 0; padding: 0; 
            color: var(--text-main); font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            letter-spacing: 0.02em;
        }
        
        /* 霧面頂欄 */
        .header { 
            background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); 
            padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; 
            border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 100;
        }
        .header-title { font-weight: 700; font-size: 1rem; color: var(--accent); letter-spacing: 3px; }
        
        .btn-circle { 
            background: white; border: 1px solid var(--line); width: 38px; height: 38px; 
            border-radius: 50%; color: var(--accent); cursor: pointer; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px var(--shadow-soft); transition: 0.2s;
        }

        .container { padding: 24px 18px; max-width: 480px; margin: 0 auto; }

        /* ✨ 擬物化與質感卡片 */
        .card { 
            background: var(--card); border-radius: 32px; padding: 28px; 
            margin-bottom: 24px; box-shadow: 0 12px 30px var(--shadow-soft); 
            border: 1px solid white; position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card:hover { transform: translateY(-3px); }

        /* 卡片上方的優雅點綴 */
        .card-type-tag {
            position: absolute; top: 20px; right: 24px; 
            font-size: 0.7rem; color: var(--accent); opacity: 0.4;
            letter-spacing: 1px; text-transform: uppercase;
        }

        .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; }
        .icon-box { 
            width: 42px; height: 42px; background: #FAF9F6; border-radius: 14px; 
            display: flex; align-items: center; justify-content: center; 
            color: var(--accent); border: 1px solid var(--line); font-size: 1.1rem;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.02);
        }
        .bank-name { font-weight: 700; font-size: 1.15rem; color: #2D2D2D; }

        /* 數據展示排版 */
        .data-section { border-top: 1px solid var(--line); padding-top: 18px; }
        .data-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
        
        .label { color: var(--text-sub); font-size: 0.8rem; font-weight: 400; }
        
        /* 金額：視覺重心 */
        .val-money { 
            font-size: 1.6rem; font-weight: 800; color: var(--accent); 
            font-family: 'Inter', 'SF Mono', monospace; letter-spacing: -0.5px;
        }
        
        /* 利率標籤：精緻色塊 */
        .val-rate { 
            color: #C08E5B; font-weight: 700; background: #FDF5ED; 
            padding: 2px 10px; border-radius: 8px; font-size: 0.9rem;
        }

        .val-normal { color: var(--text-main); font-weight: 600; font-size: 0.95rem; }

        /* 底部備註小字 */
        .data-footer { 
            margin-top: 15px; padding-top: 10px; border-top: 1px dashed var(--line);
            display: flex; justify-content: space-between; align-items: center;
        }
        .date-text { font-size: 0.75rem; color: var(--text-sub); }

        /* 登入視窗：極簡留白 */
        .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { 
            background: white; padding: 40px; border-radius: 40px; text-align: center; 
            width: 80%; max-width: 320px; box-shadow: 0 25px 50px rgba(142, 115, 91, 0.15); 
        }
        input { 
            width: 100%; padding: 16px; margin: 24px 0; border: 1px solid var(--line); 
            border-radius: 18px; text-align: center; font-size: 1.4rem; 
            background: #FBFBFA; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: white; box-shadow: 0 0 0 4px rgba(142, 115, 91, 0.05); }
        .btn-unlock { 
            width: 100%; padding: 16px; background: var(--accent); color: white; 
            border: none; border-radius: 18px; font-weight: 700; cursor: pointer; 
            box-shadow: 0 8px 20px rgba(142, 115, 91, 0.2);
        }
    </style>
</head>
<body>

<div id="loginOverlay" class="overlay">
    <div class="modal">
        <div style="font-size: 2.5rem; margin-bottom: 10px;">☕</div>
        <h2 style="margin:0; font-weight: 700; color: var(--accent);">Vault Access</h2>
        <p style="color:var(--text-sub); font-size:0.85rem; margin-top:5px;">Secure Identity Verification</p>
        <input type="password" id="passInput" placeholder="••••" inputmode="numeric">
        <button class="btn-unlock" onclick="unlock()">確認解鎖</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <button class="btn-circle" onclick="location.href='../index.html'"><i class="fas fa-arrow-left"></i></button>
        <div class="header-title">MY ASSETS</div>
        <button class="btn-circle" onclick="fetchData()"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div id="dataList" class="container"></div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwU42wa6M0JXwxDXetSH37-QwDGxNu1tbqbiM80tag-qzNC9Vmckf5UgnfCKAurptZb/exec";

    function unlock() {
        const val = document.getElementById('passInput').value;
        if(val) { sessionStorage.setItem('vault_key', val); start(); }
    }

    function start() {
        document.getElementById('loginOverlay').style.display='none';
        document.getElementById('app').style.display='block';
        fetchData();
    }

    async function fetchData() {
        const list = document.getElementById('dataList');
        list.innerHTML = '<div style="text-align:center; padding:50px; color:#A0A0A0; font-size:0.9rem;">正在同步雲端帳本...</div>';
        try {
            const res = await fetch(`${API_URL}?pwd=${sessionStorage.getItem('vault_key')}`);
            const json = await res.json();
            if(json.status === "success") render(json.headers, json.data);
            else { alert("授權碼錯誤"); location.reload(); }
        } catch(e) { list.innerHTML = "系統連線異常"; }
    }

    function render(headers, data) {
        document.getElementById('dataList').innerHTML = data.map(item => {
            const amount = Number(String(item['金額']).replace(/[^0-9.-]/g,'')).toLocaleString();
            
            // 將剩餘數據區分為主要(金額/利率)與次要(備註/日期)
            let coreRows = "";
            let footerDate = "";

            headers.forEach(h => {
                if (h === '帳戶名稱' || h === '帳戶類別') return;
                let val = item[h] || '-';

                if (h.includes('日期')) {
                    const d = new Date(val);
                    footerDate = isNaN(d) ? val : `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
                    return;
                }

                if (h.includes('金額')) {
                    coreRows += `
                        <div class="data-row">
                            <span class="label">當前餘額</span>
                            <span class="val-money">$ ${amount}</span>
                        </div>`;
                } else if (h.includes('利率')) {
                    const rate = (parseFloat(val) * 100).toFixed(2) + '%';
                    coreRows += `
                        <div class="data-row">
                            <span class="label">預估利率</span>
                            <span class="val-rate">${rate}</span>
                        </div>`;
                } else {
                    coreRows += `
                        <div class="data-row">
                            <span class="label">${h}</span>
                            <span class="val-normal">${val}</span>
                        </div>`;
                }
            });

            return `
            <div class="card">
                <span class="card-type-tag">${item['帳戶類別'] || 'Personal'}</span>
                <div class="card-header">
                    <div class="icon-box"><i class="fas fa-university"></i></div>
                    <div class="bank-name">${item['帳戶名稱']}</div>
                </div>
                <div class="data-section">
                    ${coreRows}
                </div>
                <div class="data-footer">
                    <span class="date-text"><i class="far fa-calendar-check" style="margin-right:4px"></i> 更新日期</span>
                    <span class="date-text">${footerDate}</span>
                </div>
            </div>`;
        }).join('');
    }

    if(sessionStorage.getItem('vault_key')) start();
</script>
</body>
</html>
