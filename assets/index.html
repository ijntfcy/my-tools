<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #F9F9F7; 
            --card: #FFFFFF; 
            --accent: #8E735B; 
            --text-main: #3C3C3C;
            --text-sub: #A0A0A0;
            --line: #F1EFEA;
            --warm-grad: linear-gradient(135deg, #EADBC8 0%, #D2B48C 100%);
        }
        
        body { background: var(--bg); margin: 0; padding: 0; color: var(--text-main); font-family: "PingFang TC", sans-serif; letter-spacing: 0.02em; }
        
        /* 頂部導覽列 */
        .header { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); 
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--line);
        }
        .header-title { font-weight: 800; font-size: 0.9rem; color: var(--accent); letter-spacing: 2px; }
        .btn-circle { background: white; border: 1px solid var(--line); width: 38px; height: 38px; border-radius: 50%; color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }

        .container { padding: 0 20px 40px; max-width: 480px; margin: 0 auto; }

        /* 💰 總資產面板 */
        .summary-panel {
            background: var(--warm-grad); border-radius: 35px; padding: 30px; 
            margin: 20px 0; color: white; box-shadow: 0 15px 35px rgba(142, 115, 91, 0.2);
            text-align: center; position: relative; overflow: hidden;
        }
        .summary-panel::after { content: "VAULT"; position: absolute; right: -10px; bottom: -10px; font-size: 4rem; font-weight: 900; opacity: 0.1; }
        .summary-label { font-size: 0.85rem; opacity: 0.9; letter-spacing: 1px; margin-bottom: 10px; }
        .summary-amount { font-size: 2.2rem; font-weight: 900; font-family: 'Lato', sans-serif; }

        /* 🔘 分類快捷按鈕 */
        .filter-bar { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 25px; }
        .btn-filter { 
            flex: 1; padding: 12px 5px; border-radius: 18px; border: 1px solid var(--line);
            background: white; color: var(--accent); font-weight: 700; font-size: 0.85rem;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.03); transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        .btn-filter i { font-size: 1rem; opacity: 0.7; }
        .btn-filter:active { transform: translateY(2px); background: #FAF9F6; }

        /* 🏦 資產卡片 */
        .card { 
            background: var(--card); border-radius: 30px; padding: 25px; 
            margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.04); 
            border: 1px solid white; position: relative;
        }
        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .bank-icon { width: 40px; height: 40px; background: #FDFBF9; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--accent); border: 1px solid var(--line); }
        .bank-name { font-weight: 700; font-size: 1.1rem; color: #333; }
        
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-top: 1px solid var(--line); }
        .label { color: var(--text-sub); font-size: 0.8rem; }
        .val-money { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
        .val-rate { color: #C08E5B; font-weight: 700; background: #FDF5ED; padding: 2px 8px; border-radius: 8px; font-size: 0.85rem; }
        .val-normal { font-weight: 600; font-size: 0.9rem; }

        /* 授權視窗 */
        .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; padding: 40px; border-radius: 40px; text-align: center; width: 80%; max-width: 320px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid var(--line); border-radius: 15px; text-align: center; font-size: 1.5rem; background: #FBFBFA; outline: none; }
        .btn-unlock { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginOverlay" class="overlay">
    <div class="modal">
        <div style="font-size: 2.5rem; margin-bottom: 10px;">🏠</div>
        <h2 style="margin:0; font-weight: 700; color: var(--accent);">Welcome Back</h2>
        <input type="password" id="pInput" placeholder="••••" inputmode="numeric">
        <button class="btn-unlock" onclick="unlock()">驗證進入</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <button class="btn-circle" onclick="location.href='../index.html'"><i class="fas fa-home"></i></button>
        <div class="header-title">VAULT DASHBOARD</div>
        <button class="btn-circle" onclick="fetchData()"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div class="container">
        <div class="summary-panel">
            <div class="summary-label">TOTAL ASSETS</div>
            <div class="summary-amount" id="totalAmount">$ 0</div>
        </div>

        <div class="filter-bar">
            <button class="btn-filter" onclick="filterType('活存')"><i class="fas fa-wallet"></i>活存</button>
            <button class="btn-filter" onclick="filterType('定存')"><i class="fas fa-lock"></i>定存</button>
            <button class="btn-filter" onclick="filterType('外幣')"><i class="fas fa-globe"></i>外幣</button>
        </div>

        <div id="dataList"></div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwU42wa6M0JXwxDXetSH37-QwDGxNu1tbqbiM80tag-qzNC9Vmckf5UgnfCKAurptZb/exec";
    let rawData = [];

    function unlock() {
        const val = document.getElementById('pInput').value;
        if(val) { sessionStorage.setItem('v_pwd', val); start(); }
    }

    function start() {
        document.getElementById('loginOverlay').style.display='none';
        document.getElementById('app').style.display='block';
        fetchData();
    }

    async function fetchData() {
        const list = document.getElementById('dataList');
        list.innerHTML = '<div style="text-align:center; padding:50px; color:#A0A0A0;">載入資產中...</div>';
        try {
            const res = await fetch(`${API}?pwd=${sessionStorage.getItem('v_pwd')}`);
            const json = await res.json();
            if(json.status === "success") {
                rawData = json.data;
                calculateTotal(json.data);
                render(json.headers, json.data);
            } else { alert("驗證失效"); location.reload(); }
        } catch(e) { list.innerHTML = "同步失敗"; }
    }

    function calculateTotal(data) {
        let total = data.reduce((sum, item) => {
            let val = String(item['金額']).replace(/[^0-9.-]/g, '');
            return sum + (parseFloat(val) || 0);
        }, 0);
        document.getElementById('totalAmount').innerText = `$ ${total.toLocaleString()}`;
    }

    function filterType(type) {
        // 這邊可以實作過濾邏輯，目前我們先簡單跳轉到該類別第一個卡片
        const cards = document.querySelectorAll('.card');
        for (let card of cards) {
            if (card.innerText.includes(type)) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.style.border = '2px solid var(--accent)';
                setTimeout(() => card.style.border = '1px solid white', 2000);
                break;
            }
        }
    }

    function render(headers, data) {
        document.getElementById('dataList').innerHTML = data.map(item => {
            let coreRows = headers.map(h => {
                if (['帳戶名稱', '帳戶類別'].includes(h)) return '';
                let val = item[h] || '-';
                let css = "val-normal";

                if (h.includes('金額')) {
                    val = `$ ${Number(String(val).replace(/[^0-9.-]/g,'')).toLocaleString()}`;
                    css = "val-money";
                }
                if (h.includes('利率')) {
                    val = (parseFloat(val) * 100).toFixed(2) + '%';
                    css = "val-rate";
                }
                if (h.includes('日期')) {
                    const d = new Date(val);
                    val = isNaN(d) ? val : `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
                }

                return `<div class="data-row"><span class="label">${h}</span><span class="${css}">${val}</span></div>`;
            }).join('');

            return `<div class="card">
                <div class="card-header">
                    <div class="bank-icon"><i class="fas fa-university"></i></div>
                    <div>
                        <div class="bank-name">${item['帳戶名稱']}</div>
                        <div style="font-size:0.7rem; color:var(--text-sub);">${item['帳戶類別']}</div>
                    </div>
                </div>
                ${coreRows}
            </div>`;
        }).join('');
    }

    if(sessionStorage.getItem('v_pwd')) start();
</script>
</body>
</html>
