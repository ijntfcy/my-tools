<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Console</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #000000; 
            --card-bg: #1c1c1e; 
            --accent: #0A84FF; 
            --success: #32D74B; 
            --warning: #FFD60A;
            --danger: #FF453A;
            --text-main: #FFFFFF;
            --text-sub: #8E8E93;
            --border: rgba(255, 255, 255, 0.1);
        }
        
        * { box-sizing: border-box; font-family: -apple-system, "SF Pro Text", sans-serif; }
        
        body { 
            background: var(--bg); margin: 0; padding: 0; color: var(--text-main); 
            -webkit-user-select: none; user-select: none; 
            background-attachment: fixed;
        }

        /* 毛玻璃導覽列 */
        .header { 
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            padding: 18px; border-bottom: 0.5px solid var(--border); 
            position: sticky; top: 0; z-index: 100; display: none;
        }
        
        .toolbar { display: flex; gap: 12px; max-width: 500px; margin: 0 auto; align-items: center; }
        .page-title { flex-grow: 1; font-weight: 800; font-size: 1.1rem; letter-spacing: 0.5px; }
        
        .btn-icon { 
            background: rgba(255,255,255,0.1); border: none; width: 40px; height: 40px; 
            border-radius: 12px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        /* 資產卡片 */
        .card { 
            background: var(--card-bg); border-radius: 24px; padding: 24px; 
            margin-bottom: 20px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.98); }
        
        .card-header { 
            display: flex; justify-content: space-between; align-items: flex-start;
            margin-bottom: 18px;
        }
        
        .bank-info { display: flex; align-items: center; gap: 12px; }
        .bank-icon { 
            width: 44px; height: 44px; background: rgba(10, 132, 255, 0.1); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 1.2rem;
        }
        
        .bank-name { font-weight: 700; font-size: 1.1rem; }
        .acc-type { color: var(--text-sub); font-size: 0.8rem; margin-top: 2px; }

        /* 數據列設計 */
        .data-row { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-top: 0.5px solid var(--border);
        }
        
        .label { color: var(--text-sub); font-size: 0.85rem; font-weight: 500; }
        .value { font-weight: 600; font-size: 1rem; }
        
        /* 金額與利率特殊樣式 */
        .val-primary { font-size: 1.4rem; font-weight: 800; color: var(--success); letter-spacing: -0.5px; font-family: 'SF Mono', monospace; }
        .rate-badge { 
            background: rgba(255, 214, 10, 0.15); color: var(--warning); 
            padding: 4px 10px; border-radius: 8px; font-size: 0.9rem; font-weight: 700;
        }

        /* 登入視窗美化 */
        .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal { text-align: center; width: 85%; max-width: 320px; }
        .modal-icon { 
            width: 70px; height: 70px; background: rgba(10, 132, 255, 0.1); 
            border-radius: 20px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center;
            color: var(--accent); font-size: 2rem; border: 1px solid rgba(10, 132, 255, 0.2);
        }
        input { 
            width: 100%; padding: 18px; margin-bottom: 20px; border: 1px solid var(--border); 
            background: #1c1c1e; color: white; border-radius: 16px; 
            font-size: 1.8rem; text-align: center; outline: none; letter-spacing: 10px;
        }
        .btn-primary { 
            width: 100%; padding: 16px; background: var(--accent); color: white; 
            border: none; border-radius: 16px; font-weight: 700; font-size: 1rem;
        }

        .loading-box { text-align: center; margin-top: 100px; color: var(--text-sub); }
    </style>
</head>
<body oncontextmenu="return false;">

<div id="loginOverlay" class="overlay">
    <div class="modal">
        <div class="modal-icon"><i class="fas fa-fingerprint"></i></div>
        <h2 style="margin:0 0 10px">Vault Access</h2>
        <p style="color:var(--text-sub); font-size:0.9rem; margin-bottom:30px;">Identity Verification Required</p>
        <input type="password" id="accPwd" placeholder="••••" inputmode="numeric" maxlength="4">
        <button class="btn-primary" onclick="login()">Unlock Terminal</button>
    </div>
</div>

<div id="header" class="header">
    <div class="toolbar">
        <button class="btn-icon" onclick="logout()"><i class="fas fa-chevron-left"></i></button>
        <div class="page-title">ASSET CONSOLE</div>
        <button class="btn-icon" onclick="fetchData()"><i class="fas fa-sync-alt"></i></button>
    </div>
</div>

<div id="dataList" class="container"></div>

<script>
    const CONFIG = {
        API_URL: "https://script.google.com/macros/s/AKfycbwU42wa6M0JXwxDXetSH37-QwDGxNu1tbqbiM80tag-qzNC9Vmckf5UgnfCKAurptZb/exec"
    };

    let CURRENT_PWD = sessionStorage.getItem('active_session_pwd') || "";

    window.onload = () => {
        if(CURRENT_PWD) {
            showConsole();
            fetchData();
        }
    };

    function login() {
        const pwd = document.getElementById('accPwd').value;
        if(pwd) {
            CURRENT_PWD = pwd;
            sessionStorage.setItem('active_session_pwd', pwd);
            showConsole();
            fetchData();
        }
    }

    function showConsole() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('header').style.display = 'block';
    }

    function logout() {
        sessionStorage.clear();
        window.location.href = '../index.html';
    }

    async function fetchData() {
        const list = document.getElementById('dataList');
        list.innerHTML = '<div class="loading-box"><i class="fas fa-circle-notch fa-spin fa-2x"></i><p style="margin-top:15px">Establishing Secure Link...</p></div>';
        try {
            const res = await fetch(`${CONFIG.API_URL}?pwd=${encodeURIComponent(CURRENT_PWD)}`);
            const json = await res.json();
            if(json.status === "success") {
                render(json.headers, json.data);
            } else {
                alert("Security Breach: Invalid Credentials");
                logout();
            }
        } catch(e) {
            list.innerHTML = '<div class="loading-box" style="color:var(--danger)">❌ Link Interrupted</div>';
        }
    }

    function render(headers, data) {
        document.getElementById('dataList').innerHTML = data.map(item => {
            let detailRows = headers.map(h => {
                let val = item[h];
                
                // 跳過標題已有的名稱
                if (h === '帳戶名稱') return '';

                // 金額美化
                if (h.includes('金額')) {
                    let num = String(val).replace(/[^0-9.-]/g, '');
                    let formattedNum = isNaN(num) ? val : Number(num).toLocaleString();
                    return `<div class="data-row"><span class="label">${h}</span><span class="value val-primary">NT$ ${formattedNum}</span></div>`;
                }

                // 利率美化
                if (h.includes('利率')) {
                    let rate = (parseFloat(val) * 100).toFixed(2) + '%';
                    return `<div class="data-row"><span class="label">${h}</span><span class="rate-badge">${rate}</span></div>`;
                }

                // 日期修正
                if (h.includes('日期')) {
                    const d = new Date(val);
                    val = isNaN(d) ? val : new Date(d.getTime() + 8*3600*1000).toISOString().split('T')[0];
                }

                return `<div class="data-row"><span class="label">${h}</span><span class="value">${val || '-'}</span></div>`;
            }).join('');
            
            return `
            <div class="card">
                <div class="card-header">
                    <div class="bank-info">
                        <div class="bank-icon"><i class="fas fa-university"></i></div>
                        <div>
                            <div class="bank-name">${item['帳戶名稱'] || 'Standard Account'}</div>
                            <div class="acc-type">${item['帳戶類別'] || 'Personal Asset'}</div>
                        </div>
                    </div>
                </div>
                ${detailRows}
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
