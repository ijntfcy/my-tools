<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 保留原本的所有美化 CSS */
        :root { --bg: #F9F9F7; --card: #FFFFFF; --accent: #8E735B; --text-main: #3C3C3C; --text-sub: #A0A0A0; --line: #F1EFEA; --grad: linear-gradient(135deg, #EADBC8 0%, #C19A6B 100%); }
        body { background: var(--bg); margin: 0; padding: 0; color: var(--text-main); font-family: "PingFang TC", sans-serif; }
        .header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--line); }
        .header-title { font-weight: 800; font-size: 0.85rem; color: var(--accent); letter-spacing: 2px; }
        .btn-circle { background: white; border: 1px solid var(--line); width: 38px; height: 38px; border-radius: 50%; color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .container { padding: 0 20px 50px; max-width: 480px; margin: 0 auto; }
        .summary-card { background: var(--grad); border-radius: 35px; padding: 35px 25px; margin: 20px 0; color: white; box-shadow: 0 15px 35px rgba(142, 115, 91, 0.25); text-align: center; }
        .summary-label { font-size: 0.75rem; font-weight: 700; opacity: 0.85; margin-bottom: 10px; }
        .summary-total { font-size: 2.5rem; font-weight: 900; }
        .action-bar { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 30px; }
        .btn-action { flex: 1; padding: 14px 5px; border-radius: 20px; border: 1px solid var(--line); background: white; color: var(--accent); font-weight: 700; font-size: 0.85rem; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .btn-action.active { background: var(--accent); color: white; }
        .card { background: var(--card); border-radius: 30px; padding: 25px; margin-bottom: 20px; border: 1px solid white; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.03); }
        .type-badge { position: absolute; top: 22px; right: 25px; font-size: 0.7rem; color: var(--text-sub); font-weight: 700; border: 1px solid var(--line); padding: 2px 8px; border-radius: 8px; }
        .bank-name { font-weight: 800; font-size: 1.1rem; margin-bottom: 15px; display: block; color: #333; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-top: 1px solid var(--line); }
        .val-money { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
        .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; padding: 40px; border-radius: 40px; text-align: center; width: 80%; max-width: 300px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid var(--line); border-radius: 15px; text-align: center; font-size: 1.5rem; outline: none; box-sizing: border-box; }
        .btn-go { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginOverlay" class="overlay">
    <div class="modal">
        <div style="font-size: 3rem; margin-bottom: 10px;">🍯</div>
        <h2 style="margin:0; color: var(--accent);">安全驗證</h2>
        <input type="password" id="passCode" placeholder="••••" inputmode="numeric">
        <button class="btn-go" onclick="unlock()">確認解鎖</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <button class="btn-circle" onclick="location.href='../index.html'"><i class="fas fa-home"></i></button>
        <div id="userWelcome" class="header-title">LOADING...</div>
        <div style="width:38px;"></div>
    </div>

    <div class="container">
        <div class="summary-card">
            <div id="levelLabel" class="summary-label">TOTAL ASSETS</div>
            <div id="totalDisplay" class="summary-total">$ 0</div>
        </div>

        <div class="action-bar">
            <button class="btn-action" id="btnFilter" onclick="cycleFilter()"><i class="fas fa-university"></i><span id="filterLabel">帳戶</span></button>
            <button class="btn-action" onclick="fetchData()"><i class="fas fa-sync-alt"></i>同步</button>
            <button class="btn-action" onclick="logout()"><i class="fas fa-sign-out-alt"></i>登出</button>
        </div>

        <div id="mainList"></div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwU42wa6M0JXwxDXetSH37-QwDGxNu1tbqbiM80tag-qzNC9Vmckf5UgnfCKAurptZb/exec";
    
    // 💡 關鍵：密碼只存在變數中，離開或刷新頁面就會消失
    let pageKey = ""; 
    let allData = [], allHeaders = [], dynamicTypes = ["全部"], currentTypeIdx = 0;

    function unlock() {
        const p = document.getElementById('passCode').value;
        if(p) { 
            pageKey = p; // 存入記憶體變數
            start(); 
        }
    }

    function logout() { 
        pageKey = ""; 
        location.reload(); 
    }

    function start() {
        document.getElementById('loginOverlay').style.display='none';
        document.getElementById('app').style.display='block';
        fetchData();
    }

    async function fetchData() {
        const list = document.getElementById('mainList');
        list.innerHTML = '<div style="text-align:center; padding:50px; color:#A0A0A0;">讀取中...</div>';
        try {
            const res = await fetch(`${API_URL}?pwd=${pageKey}`);
            const json = await res.json();
            if(json.status === "success") {
                allData = json.data;
                allHeaders = json.headers;
                document.getElementById('userWelcome').innerText = `HELLO, ${json.userName}`;
                document.getElementById('levelLabel').innerText = `ASSETS (${json.userLevel})`;
                
                const types = [...new Set(allData.map(d => d['帳戶類別']))].filter(Boolean);
                dynamicTypes = ["全部", ...types];
                
                updateTotal(allData);
                render();
            } else { 
                alert(json.message); 
                logout(); 
            }
        } catch(e) { list.innerHTML = "連線失敗"; }
    }

    function updateTotal(data) {
        const total = data.reduce((s, i) => s + (parseFloat(String(i['金額']).replace(/[^0-9.-]/g, '')) || 0), 0);
        document.getElementById('totalDisplay').innerText = `$ ${total.toLocaleString()}`;
    }

    function cycleFilter() {
        currentTypeIdx = (currentTypeIdx + 1) % dynamicTypes.length;
        document.getElementById('filterLabel').innerText = (dynamicTypes[currentTypeIdx] === "全部") ? "帳戶" : dynamicTypes[currentTypeIdx];
        document.getElementById('btnFilter').classList.toggle('active', currentTypeIdx !== 0);
        render();
    }

    function render() {
        const type = dynamicTypes[currentTypeIdx];
        const filtered = (type === "全部") ? allData : allData.filter(d => d['帳戶類別'] === type);
        document.getElementById('mainList').innerHTML = filtered.map(item => {
            let rows = allHeaders.map(h => {
                if(['帳戶名稱','帳戶類別'].includes(h)) return '';
                let val = item[h] || '-', css = "";
                if(h.includes('金額')) { 
                    val = `$ ${Number(String(val).replace(/[^0-9.-]/g,'')).toLocaleString()}`; 
                    css = "val-money"; 
                }
                if(h.includes('利率')) { val = (parseFloat(val)*100).toFixed(2)+'%'; }
                return `<div class="row"><span style="color:#A0A0A0; font-size:0.8rem">${h}</span><span class="${css}">${val}</span></div>`;
            }).join('');
            return `<div class="card"><span class="type-badge">${item['帳戶類別']}</span><span class="bank-name">${item['帳戶名稱']}</span>${rows}</div>`;
        }).join('');
    }
</script>
</body>
</html>
