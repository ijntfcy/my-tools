<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vault Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #F9F9F7; 
            --card: #FFFFFF; 
            --accent: #8E735B; /* 質感咖啡棕 */
            --gold: #B8860B;   /* 琥珀金 */
            --text-main: #3C3C3C;
            --text-sub: #A0A0A0;
            --line: #F1EFEA;
            --grad: linear-gradient(135deg, #EADBC8 0%, #C19A6B 100%);
        }
        
        body { background: var(--bg); margin: 0; padding: 0; color: var(--text-main); font-family: "PingFang TC", "STHeiti", sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* 霧面導覽列 */
        .header { 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px); 
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--line);
        }
        .header-title { font-weight: 800; font-size: 0.85rem; color: var(--accent); letter-spacing: 2.5px; }
        .btn-circle { background: white; border: 1px solid var(--line); width: 38px; height: 38px; border-radius: 50%; color: var(--accent); cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .container { padding: 0 20px 50px; max-width: 480px; margin: 0 auto; }

        /* 💰 總資產儀表板 */
        .summary-card {
            background: var(--grad); border-radius: 35px; padding: 35px 25px; 
            margin: 20px 0; color: white; box-shadow: 0 15px 35px rgba(142, 115, 91, 0.25);
            text-align: center; position: relative; overflow: hidden;
        }
        .summary-card::before { content: "\f51e"; font-family: "Font Awesome 5 Free"; font-weight: 900; position: absolute; right: -15px; bottom: -15px; font-size: 5rem; opacity: 0.1; }
        .summary-label { font-size: 0.75rem; font-weight: 700; opacity: 0.85; letter-spacing: 2px; margin-bottom: 12px; }
        .summary-total { font-size: 2.5rem; font-weight: 900; font-family: 'Lato', sans-serif; letter-spacing: -1px; }

        /* 🔘 分類過濾按鈕 */
        .filter-group { display: flex; justify-content: space-between; gap: 12px; margin-bottom: 30px; }
        .btn-filter { 
            flex: 1; padding: 14px 5px; border-radius: 20px; border: 1px solid var(--line);
            background: white; color: var(--accent); font-weight: 700; font-size: 0.8rem;
            cursor: pointer; transition: all 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 6px;
        }
        .btn-filter i { font-size: 1.1rem; color: var(--accent); opacity: 0.6; }
        .btn-filter:active { transform: scale(0.95); background: #FAF9F6; border-color: var(--accent); }

        /* 🏦 資產卡片 */
        .card { 
            background: var(--card); border-radius: 32px; padding: 28px; 
            margin-bottom: 25px; box-shadow: 0 12px 30px rgba(166, 142, 116, 0.08); 
            border: 1px solid white; position: relative; transition: 0.3s;
        }
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .icon-box { width: 44px; height: 44px; background: #FDFBF9; border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--accent); border: 1px solid var(--line); font-size: 1.2rem; }
        .bank-name { font-weight: 800; font-size: 1.15rem; color: #333; }
        .type-badge { position: absolute; top: 25px; right: 28px; font-size: 0.7rem; color: var(--text-sub); font-weight: 700; letter-spacing: 1px; }
        
        .row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-top: 1px solid var(--line); }
        .label { color: var(--text-sub); font-size: 0.85rem; font-weight: 500; }
        
        /* 文字配色美化 */
        .val-money { font-size: 1.5rem; font-weight: 800; color: var(--accent); font-family: 'Lato', sans-serif; }
        .val-rate { color: #D48E43; font-weight: 700; background: #FFF9F2; padding: 3px 10px; border-radius: 10px; font-size: 0.9rem; }
        .val-text { font-weight: 600; color: var(--text-main); font-size: 0.95rem; }

        .footer-info { margin-top: 15px; padding-top: 12px; border-top: 1px dashed var(--line); display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-sub); }

        /* 驗證視窗 */
        .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; padding: 45px 35px; border-radius: 40px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 25px 50px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 18px; margin: 25px 0; border: 1px solid var(--line); border-radius: 20px; text-align: center; font-size: 1.5rem; background: #FBFBFA; outline: none; }
        .btn-go { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 20px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginOverlay" class="overlay">
    <div class="modal">
        <div style="font-size: 3rem; margin-bottom: 10px;">🍯</div>
        <h2 style="margin:0; font-weight: 800; color: #333;">甜蜜帳本</h2>
        <input type="password" id="passCode" placeholder="••••" inputmode="numeric">
        <button class="btn-go" onclick="unlock()">進入控制台</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <button class="btn-circle" onclick="location.href='../index.html'"><i class="fas fa-home"></i></button>
        <div class="header-title">ASSET OVERVIEW</div>
        <button class="btn-circle" onclick="fetchData()"><i class="fas fa-sync-alt"></i></button>
    </div>

    <div class="container">
        <div class="summary-card">
            <div class="summary-label">TOTAL NET WORTH</div>
            <div class="summary-total" id="totalDisplay">$ 0</div>
        </div>

        <div class="filter-group">
            <button class="btn-filter" onclick="scrollToType('活存')"><i class="fas fa-wallet"></i>活存帳戶</button>
            <button class="btn-filter" onclick="scrollToType('定存')"><i class="fas fa-piggy-bank"></i>定存計畫</button>
            <button class="btn-filter" onclick="scrollToType('外幣')"><i class="fas fa-coins"></i>外幣資產</button>
        </div>

        <div id="mainList"></div>
    </div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwU42wa6M0JXwxDXetSH37-QwDGxNu1tbqbiM80tag-qzNC9Vmckf5UgnfCKAurptZb/exec";

    function unlock() {
        const val = document.getElementById('passCode').value;
        if(val) { sessionStorage.setItem('v_key', val); start(); }
    }

    function start() {
        document.getElementById('loginOverlay').style.display='none';
        document.getElementById('app').style.display='block';
        fetchData();
    }

    async function fetchData() {
        const list = document.getElementById('mainList');
        list.innerHTML = '<div style="text-align:center; padding:50px; color:#A0A0A0; font-style:italic;">正在同步雲端資產...</div>';
        try {
            const res = await fetch(`${API}?pwd=${sessionStorage.getItem('v_key')}`);
            const json = await res.json();
            if(json.status === "success") {
                updateTotal(json.data);
                renderCards(json.headers, json.data);
            } else { alert("驗證碼不正確"); location.reload(); }
        } catch(e) { list.innerHTML = "連線失敗"; }
    }

    function updateTotal(data) {
        const total = data.reduce((sum, item) => {
            const val = String(item['金額']).replace(/[^0-9.-]/g, '');
            return sum + (parseFloat(val) || 0);
        }, 0);
        document.getElementById('totalDisplay').innerText = `$ ${total.toLocaleString()}`;
    }

    function scrollToType(type) {
        const cards = document.querySelectorAll('.card');
        for (let card of cards) {
            if (card.getAttribute('data-type').includes(type)) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.style.borderColor = 'var(--accent)';
                setTimeout(() => card.style.borderColor = 'white', 1500);
                break;
            }
        }
    }

    function renderCards(headers, data) {
        document.getElementById('mainList').innerHTML = data.map(item => {
            const type = item['帳戶類別'] || '其他';
            let dateStr = "";
            
            let rows = headers.map(h => {
                if (['帳戶名稱', '帳戶類別'].includes(h)) return '';
                let val = item[h] || '-';
                
                if (h.includes('日期')) {
                    const d = new Date(val);
                    dateStr = isNaN(d) ? val : `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
                    return '';
                }
                
                if (h.includes('金額')) {
                    const num = Number(String(val).replace(/[^0-9.-]/g,'')).toLocaleString();
                    return `<div class="row"><span class="label">當前餘額</span><span class="val-money">$ ${num}</span></div>`;
                }
                
                if (h.includes('利率')) {
                    const rate = (parseFloat(val) * 100).toFixed(2) + '%';
                    return `<div class="row"><span class="label">年利率</span><span class="val-rate">${rate}</span></div>`;
                }

                return `<div class="row"><span class="label">${h}</span><span class="val-text">${val}</span></div>`;
            }).join('');

            return `
            <div class="card" data-type="${type}">
                <div class="type-badge">${type.toUpperCase()}</div>
                <div class="card-header">
                    <div class="icon-box"><i class="fas fa-university"></i></div>
                    <div class="bank-name">${item['帳戶名稱']}</div>
                </div>
                ${rows}
                <div class="footer-info">
                    <span><i class="far fa-clock"></i> 更新時間</span>
                    <span>${dateStr}</span>
                </div>
            </div>`;
        }).join('');
    }

    if(sessionStorage.getItem('v_key')) start();
</script>
</body>
</html>
