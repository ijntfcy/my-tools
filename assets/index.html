<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Elegant Assets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #F9F9F7; 
            --card-bg: #FFFFFF; 
            --accent: #A68E74; /* 焦糖棕 */
            --text-main: #4A4A4A; /* 深暖灰 */
            --text-sub: #B2B2B2; /* 淡灰 */
            --line: #F2EEE9; /* 分割線 */
            --shadow: rgba(166, 142, 116, 0.1);
        }
        
        body { background: var(--bg); margin: 0; padding: 0; color: var(--text-main); font-family: "PingFang TC", "Heiti TC", sans-serif; }
        
        .header { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); padding: 18px 25px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 100; }
        .header-title { font-weight: 600; font-size: 1.1rem; color: var(--accent); letter-spacing: 2px; }
        
        .btn-action { background: white; border: 1px solid var(--line); width: 42px; height: 42px; border-radius: 50%; color: var(--accent); cursor: pointer; box-shadow: 0 4px 10px var(--shadow); transition: 0.2s; }
        .btn-action:active { transform: scale(0.9); }

        .container { padding: 30px 20px; max-width: 500px; margin: 0 auto; }

        /* 卡片重新設計 */
        .card { 
            background: var(--card-bg); border-radius: 35px; padding: 30px; 
            margin-bottom: 30px; box-shadow: 0 15px 35px var(--shadow); 
            border: 1px solid rgba(255,255,255,0.8); position: relative;
        }

        /* 標題區：銀行名稱 */
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 25px; }
        .bank-icon { width: 45px; height: 45px; background: #FDFBF9; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: var(--accent); border: 1px solid var(--line); font-size: 1.2rem; }
        .bank-name { font-weight: 700; font-size: 1.2rem; color: #3D3D3D; }

        /* 數據行排版 */
        .data-row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--line); }
        .data-row:last-child { border-bottom: none; }
        
        .label { color: var(--text-sub); font-size: 0.85rem; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .label i { font-size: 0.7rem; opacity: 0.6; }
        
        .value { font-weight: 600; font-size: 1rem; color: var(--text-main); }
        
        /* 特別強調：金額與利率 */
        .val-money { font-size: 1.4rem; font-weight: 800; color: var(--accent); font-family: 'Lato', sans-serif; }
        .val-rate { color: #D9B08C; font-weight: 700; background: #FDF7F2; padding: 4px 12px; border-radius: 10px; }

        /* 授權視窗 */
        .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: white; padding: 45px 35px; border-radius: 40px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 20px 50px var(--shadow); }
        input { width: 100%; padding: 18px; margin: 25px 0; border: 1px solid var(--line); border-radius: 20px; text-align: center; font-size: 1.5rem; background: #FDFBF9; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        .btn-unlock { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 20px; font-weight: 700; font-size: 1rem; cursor: pointer; }

        .loading { text-align: center; margin-top: 100px; color: var(--text-sub); font-style: italic; }
    </style>
</head>
<body>

<div id="loginOverlay" class="overlay">
    <div class="modal">
        <i class="fas fa-quote-left" style="font-size: 2rem; color: #EEE; margin-bottom: 20px; display: block;"></i>
        <h2 style="margin:0; font-weight: 800; color: #3D3D3D;">美好的一天</h2>
        <p style="color:var(--text-sub); font-size:0.9rem; margin-top:8px;">請輸入開啟帳本的代碼</p>
        <input type="password" id="p" placeholder="••••" inputmode="numeric">
        <button class="btn-unlock" onclick="unlock()">開啟我的小金庫</button>
    </div>
</div>

<div id="app" style="display:none;">
    <div class="header">
        <button class="btn-action" onclick="location.href='../index.html'"><i class="fas fa-chevron-left"></i></button>
        <div class="header-title">VAULT</div>
        <button class="btn-action" onclick="fetchData()"><i class="fas fa-sync-alt"></i></button>
    </div>
    <div id="dataList" class="container"></div>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwU42wa6M0JXwxDXetSH37-QwDGxNu1tbqbiM80tag-qzNC9Vmckf5UgnfCKAurptZb/exec";

    function unlock() {
        const val = document.getElementById('p').value;
        if(val) { sessionStorage.setItem('v_key', val); start(); }
    }

    function start() {
        document.getElementById('loginOverlay').style.display='none';
        document.getElementById('app').style.display='block';
        fetchData();
    }

    async function fetchData() {
        const list = document.getElementById('dataList');
        list.innerHTML = '<div class="loading">正在溫柔地載入數據...</div>';
        try {
            const res = await fetch(`${API}?pwd=${sessionStorage.getItem('v_key')}`);
            const json = await res.json();
            if(json.status === "success") render(json.headers, json.data);
            else { alert("代碼不正確喔！"); location.reload(); }
        } catch(e) { list.innerHTML = "連線失敗"; }
    }

    function render(headers, data) {
        document.getElementById('dataList').innerHTML = data.map(item => {
            const amount = Number(String(item['金額']).replace(/[^0-9.-]/g,'')).toLocaleString();
            
            let rows = headers.map(h => {
                if (h === '帳戶名稱') return '';
                let val = item[h];
                let css = "value";

                // 漂亮化日期
                if (h.includes('日期')) {
                    const d = new Date(val);
                    val = isNaN(d) ? val : `${d.getFullYear()}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')}`;
                }
                
                // 漂亮化金額
                if (h.includes('金額')) {
                    val = `$ ${amount}`;
                    css = "val-money";
                }

                // 漂亮化利率
                if (h.includes('利率')) {
                    val = (parseFloat(val) * 100).toFixed(2) + '%';
                    css = "val-rate";
                }

                return `
                <div class="data-row">
                    <span class="label"><i class="fas fa-circle"></i> ${h}</span>
                    <span class="${css}">${val || '-'}</span>
                </div>`;
            }).join('');

            return `
            <div class="card">
                <div class="card-header">
                    <div class="bank-icon"><i class="fas fa-coffee"></i></div>
                    <div class="bank-name">${item['帳戶名稱']}</div>
                </div>
                ${rows}
            </div>`;
        }).join('');
    }

    if(sessionStorage.getItem('v_key')) start();
</script>
</body>
</html>
