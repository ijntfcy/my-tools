<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Asset</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #F9F9F7; --card: #FFFFFF; --accent: #A68E74; --text: #4A4A4A; --shadow: rgba(166, 142, 116, 0.1); }
        body { background: var(--bg); margin: 0; color: var(--text); font-family: sans-serif; }
        .header { background: white; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #EEE; position: sticky; top: 0; z-index: 10; }
        .btn { background: white; border: 1px solid #EEE; width: 40px; height: 40px; border-radius: 50%; color: var(--accent); box-shadow: 0 4px 8px var(--shadow); }
        .container { padding: 20px; max-width: 500px; margin: 0 auto; }
        .card { background: white; border-radius: 25px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px var(--shadow); border: 1px solid #FDFBF9; }
        .bank-name { font-weight: 700; font-size: 1.1rem; color: #3D3D3D; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-top: 1px dashed #F2EEE9; font-size: 0.9rem; }
        .val-primary { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
        .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: white; padding: 40px; border-radius: 35px; text-align: center; width: 80%; max-width: 300px; box-shadow: 0 15px 35px var(--shadow); }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #EEE; border-radius: 15px; text-align: center; font-size: 1.5rem; background: #FDFBF9; }
        .btn-main { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 15px; font-weight: 700; }
    </style>
</head>
<body>
<div id="loginOverlay" class="overlay">
    <div class="modal">
        <i class="fas fa-leaf" style="font-size: 2rem; color: var(--accent);"></i>
        <h2 style="margin: 15px 0 5px;">Welcome</h2>
        <input type="password" id="pwd" placeholder="••••" inputmode="numeric">
        <button class="btn-main" onclick="login()">解鎖帳本</button>
    </div>
</div>
<div id="header" class="header" style="display:none;">
    <button class="btn" onclick="location.href='../index.html'"><i class="fas fa-home"></i></button>
    <div style="font-weight:700;">我的資產</div>
    <button class="btn" onclick="fetchData()"><i class="fas fa-sync-alt"></i></button>
</div>
<div id="dataList" class="container"></div>
<script>
    const API = "https://script.google.com/macros/s/AKfycbwU42wa6M0JXwxDXetSH37-QwDGxNu1tbqbiM80tag-qzNC9Vmckf5UgnfCKAurptZb/exec";
    function login() {
        const p = document.getElementById('pwd').value;
        if(p) { sessionStorage.setItem('vault_pwd', p); showUI(); fetchData(); }
    }
    function showUI() { document.getElementById('loginOverlay').style.display='none'; document.getElementById('header').style.display='flex'; }
    async function fetchData() {
        const list = document.getElementById('dataList');
        list.innerHTML = '<div style="text-align:center; margin-top:50px; color:#9B9B9B;">準備中...</div>';
        const res = await fetch(`${API}?pwd=${sessionStorage.getItem('vault_pwd')}`);
        const json = await res.json();
        if(json.status === "success") render(json.headers, json.data);
    }
    function render(headers, data) {
        document.getElementById('dataList').innerHTML = data.map(item => {
            let rows = headers.map(h => {
                let v = item[h];
                if(h.includes('金額')) v = `<span class="val-primary">$ ${Number(String(v).replace(/[^0-9.-]/g,'')).toLocaleString()}</span>`;
                if(h.includes('利率')) v = `<span style="color:#D9B08C; font-weight:700;">${(parseFloat(v)*100).toFixed(2)}%</span>`;
                return `<div class="data-row"><span>${h}</span><span>${v}</span></div>`;
            }).join('');
            return `<div class="card"><div class="bank-name"><i class="fas fa-coffee"></i> ${item['帳戶名稱']}</div>${rows}</div>`;
        }).join('');
    }
    if(sessionStorage.getItem('vault_pwd')) { showUI(); fetchData(); }
</script>
</body>
</html>
