<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Jexams 雲端測驗系統 - 專業版</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
  <style>
    :root { 
      --primary: #007AFF; --success: #34C759; --danger: #FF3B30; --bg: #F2F2F7; 
    }
    body { 
      font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; 
      display: flex; flex-direction: column; align-items: center; min-height: 100vh; 
    }
    .container { width: 100%; max-width: 600px; display: flex; flex-direction: column; flex: 1; }
    
    /* --- 功能選單區 (Jexams/擴充用1/擴充用2) --- */
    .menu-bar { 
      display: flex; background: #E5E5EA; padding: 4px; border-radius: 12px; margin-bottom: 15px;
    }
    .menu-item { 
      flex: 1; border: none; background: none; padding: 10px; border-radius: 10px; 
      font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .menu-item.active { background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1); color: var(--primary); }

    /* --- 開關控制區 (隨機題目/隨機選項) --- */
    .control-panel { 
      display: flex; justify-content: space-between; align-items: center; 
      margin-bottom: 20px; padding: 0 5px;
    }
    .toggle-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #48484A; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { 
      position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; 
      background-color: #C7C7CC; transition: .4s; border-radius: 34px; 
    }
    .slider:before { 
      position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; 
      background-color: white; transition: .4s; border-radius: 50%; 
    }
    input:checked + .slider { background-color: var(--success); }
    input:checked + .slider:before { transform: translateX(20px); }

    /* --- 題目顯示區 --- */
    .header-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 14px; color: #8E8E93; }
    .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; }
    .q-text { font-size: 1.25rem; font-weight: 700; line-height: 1.5; margin: 15px 0; }
    
    .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; }
    .opt-btn { 
      background: white; border: 1.5px solid #E5E5EA; border-radius: 12px; padding: 15px; 
      text-align: left; font-size: 1rem; cursor: pointer; display: flex; align-items: center;
    }
    .opt-btn.correct { background: var(--success) !important; color: white; border-color: var(--success); }
    .opt-btn.wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }
    
    .footer { padding: 20px 0; margin-top: auto; }
    .next-btn { 
      width: 100%; padding: 16px; border-radius: 15px; border: none; 
      background: var(--primary); color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; 
    }
    .next-btn:disabled { background: #C7C7CC; }
  </style>
</head>
<body>

<div class="container">
  <div class="menu-bar">
    <button class="menu-item" id="m-Jexams" onclick="changeSheet('Jexams')">Jexams</button>
    <button class="menu-item" id="m-擴充用1" onclick="changeSheet('擴充用1')">擴充用1</button>
    <button class="menu-item" id="m-擴充用2" onclick="changeSheet('擴充用2')">擴充用2</button>
  </div>

  <div class="control-panel">
    <div class="toggle-group">
      <span>題目隨機</span>
      <label class="switch"><input type="checkbox" id="qRandom" onchange="applySettings()"><span class="slider"></span></label>
    </div>
    <div class="toggle-group">
      <span>選項隨機</span>
      <label class="switch"><input type="checkbox" id="optRandom" onchange="applySettings()"><span class="slider"></span></label>
    </div>
  </div>

  <div class="header-info">
    <span id="progress">載入中...</span>
    <span id="score">得分: 0</span>
  </div>

  <div class="card animate__animated animate__fadeIn">
    <div id="qText" class="q-text">讀取題庫中...</div>
  </div>

  <div id="options" class="options-grid"></div>

  <div class="footer">
    <button id="nextBtn" class="next-btn" onclick="nextQuestion()" disabled>下一題</button>
  </div>
</div>

<script>
  // 請更換為您的 GAS 部署網址
  const API_URL = "https://script.google.com/macros/s/AKfycbwqJXMzDORmYWyyZQqgx5fKCTzpBc8vkfwbJpfPZpa-EgHPU0MY5Zh5CSsZbyfPcuEXKQ/exec";
  
  let rawData = [], currentSheet = new URLSearchParams(window.location.search).get('sheet') || 'Jexams';
  let quizData = [], index = 0, totalScore = 0;

  // 初始化：載入資料並設定選單狀態
  window.onload = async () => {
    document.getElementById(`m-${currentSheet}`).classList.add('active');
    try {
      const resp = await fetch(`${API_URL}?sheet=${currentSheet}`);
      rawData = await resp.json();
      applySettings();
    } catch (e) { document.getElementById('qText').innerText = "連線失敗，請檢查網路或 API 設定。"; }
  };

  // 切換分頁選單功能
  function changeSheet(name) { window.location.search = `?sheet=${name}`; }

  // 應用設定：處理題目與選項的排序
  function applySettings() {
    const isQRandom = document.getElementById('qRandom').checked;
    quizData = isQRandom ? [...rawData].sort(() => Math.random() - 0.5) : [...rawData];
    index = 0; totalScore = 0;
    render();
  }

  // 渲染題目與選項 (包含選項隨機功能)
  function render() {
    if (index >= quizData.length) { finishQuiz(); return; }
    const q = quizData[index];
    const isOptRandom = document.getElementById('optRandom').checked;
    
    document.getElementById('progress').innerText = `第 ${index + 1} / ${quizData.length} 題`;
    document.getElementById('qText').innerText = q.q;
    document.getElementById('nextBtn').disabled = true;

    // 處理選項排序
    let displayOpts = q.opts.map((text, i) => ({ text, isCorrect: (i + 1).toString() === q.ans }));
    if (isOptRandom) displayOpts.sort(() => Math.random() - 0.5);

    const container = document.getElementById('options');
    container.innerHTML = '';
    displayOpts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn animate__animated fadeIn';
      btn.innerText = opt.text;
      btn.onclick = () => check(btn, opt.isCorrect);
      container.appendChild(btn);
    });
  }

  function check(btn, isCorrect) {
    document.querySelectorAll('.opt-btn').forEach(b => b.onclick = null);
    if (isCorrect) { btn.classList.add('correct'); totalScore++; } 
    else { btn.classList.add('wrong'); }
    document.getElementById('score').innerText = `得分: ${totalScore}`;
    document.getElementById('nextBtn').disabled = false;
  }

  function nextQuestion() { index++; render(); }

  function finishQuiz() {
    const pass = totalScore >= quizData.length * 0.6; // 及格判定：答對 60% 以上
    document.getElementById('qText').innerHTML = `<h2>測驗結束</h2><p>最終得分：${totalScore}</p><p>${pass ? '🎉 恭喜及格！' : '📝 仍需努力，不及格哦。'}</p>`;
    document.getElementById('options').innerHTML = '';
    document.getElementById('nextBtn').innerText = "重新開始";
    document.getElementById('nextBtn').onclick = () => location.reload();
  }
</script>
</body>
</html>
