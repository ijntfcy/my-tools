<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <style>
        /* ... 之前的 CSS ... */
        .menu-bar { display: flex; background: #E5E5EA; padding: 4px; border-radius: 12px; margin-bottom: 12px; flex-wrap: wrap; gap: 4px; }
        .menu-item { flex: 1; min-width: 80px; border: none; background: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .menu-item.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        /* ... 之前的 CSS ... */
    </style>
</head>
<body>

<div class="container">
    <div id="sheetMenu" class="menu-bar"></div>

    <div class="control-panel">
        <label class="switch-label"><input type="checkbox" id="qRandom" onchange="initQuiz()"> 題目隨機</label>
        <label class="switch-label"><input type="checkbox" id="optRandom" onchange="render()"> 選項隨機</label>
    </div>
    </div>

<script>
    const API_URL = "你的GAS部署網址"; 
    let rawData = [], quizData = [], index = 0, selectedIds = [];
    let totalSeconds = 0, qSeconds = 0, totalInterval, qInterval;

    // 取得網址上的 sheet 參數，如果沒有則預設為空
    let currentSheet = new URLSearchParams(window.location.search).get('sheet');

    window.onload = async () => {
        try {
            // 1. 先獲取所有分頁名稱
            const listResp = await fetch(`${API_URL}?type=listSheets`);
            const sheetNames = await listResp.json();
            
            // 2. 動態產生選單按鈕
            const menuContainer = document.getElementById('sheetMenu');
            if (!currentSheet) currentSheet = sheetNames[0]; // 若網址沒指定，預設抓第一個

            sheetNames.forEach(name => {
                const btn = document.createElement('button');
                btn.className = `menu-item ${name === currentSheet ? 'active' : ''}`;
                btn.innerText = name;
                btn.onclick = () => changeSheet(name);
                menuContainer.appendChild(btn);
            });

            // 3. 抓取對應分頁的題目資料
            const resp = await fetch(`${API_URL}?sheet=${currentSheet}`);
            rawData = await resp.json();
            
            startTotalTimer();
            initQuiz();
        } catch (e) { document.getElementById('qText').innerText = "連線失敗或分頁不存在。"; }
    };

    function changeSheet(name) { window.location.search = `?sheet=${encodeURIComponent(name)}`; }

    // ... 剩下的 initQuiz, render, handleSelect, handleAction 邏輯全部維持上一版本的優化版 ...
</script>
</body>
</html>
