<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>測驗系統</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; }
        body { font-family: sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .container { width: 100%; max-width: 600px; }
        .menu-bar { display: flex; background: #E5E5EA; padding: 4px; border-radius: 12px; margin-bottom: 12px; }
        .menu-item { flex: 1; border: none; background: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .menu-item.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* 修正：隨機按鈕靠左對齊並排 */
        .control-panel { display: flex; justify-content: flex-start; gap: 20px; margin-bottom: 15px; font-size: 14px; font-weight: bold; }
        
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .q-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 20px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .opt-btn { background: white; border: 1.5px solid #E5E5EA; border-radius: 12px; padding: 16px; text-align: left; cursor: pointer; font-size: 1rem; }
        .opt-btn.selected { border-color: var(--primary); background: #E8F0FE; }
        .opt-btn.correct { background: #34C759 !important; color: white; }
        .opt-btn.wrong { background: #FF3B30 !important; color: white; }
        .action-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; background: #D1D1D6; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .action-btn.ready { background: var(--primary); }
    </style>
</head>
<body>
<div class="container">
    <div class="menu-bar">
        <button class="menu-item" id="m-Jexams" onclick="changeSheet('Jexams')">Jexams</button>
        <button class="menu-item" id="m-擴充用1" onclick="changeSheet('擴充用1')">擴充用1</button>
        <button class="menu-item" id="m-擴充用2" onclick="changeSheet('擴充用2')">擴充用2</button>
    </div>

    <div class="control-panel">
        <label><input type="checkbox" id="qRandom" onchange="initQuiz()"> 題目隨機</label>
        <label><input type="checkbox" id="optRandom" onchange="render()"> 選項隨機</label>
    </div>

    <div class="card">
        <div id="qText" class="q-text">讀取中...</div>
        <div id="options" class="options-grid"></div>
    </div>
    <div class="footer"><button id="mainBtn" class="action-btn" onclick="handleAction()" disabled>下一題</button></div>
</div>

<script>
    const API_URL = "您的新GAS部署網址"; 
    let rawData = [], quizData = [], index = 0, selectedIds = [];
    const currentSheet = new URLSearchParams(window.location.search).get('sheet') || 'Jexams';
    document.getElementById(`m-${currentSheet}`).classList.add('active');

    window.onload = async () => {
        try {
            const resp = await fetch(`${API_URL}?sheet=${currentSheet}`);
            rawData = await resp.json();
            if (rawData.error) throw new Error(rawData.error);
            initQuiz();
        } catch (e) { document.getElementById('qText').innerText = "連線失敗：" + e.message; }
    };

    function changeSheet(name) { window.location.search = `?sheet=${name}`; }
    function initQuiz() {
        quizData = document.getElementById('qRandom').checked ? [...rawData].sort(() => Math.random() - 0.5) : [...rawData];
        index = 0; render();
    }

    function render() {
        if (index >= quizData.length) { document.getElementById('qText').innerText = "測驗結束！"; return; }
        const q = quizData[index];
        document.getElementById('qText').innerText = q.q;
        const container = document.getElementById('options');
        container.innerHTML = "";
        selectedIds = [];
        
        // 自動生成選項：是非題補上 O/X
        let optsData = (q.opts && q.opts.length > 0) ? q.opts : ["O", "X"];
        let opts = optsData.map((t, i) => ({ text: t, id: (q.ans === "O" || q.ans === "X") ? t : (i + 1).toString() }));
        
        if (document.getElementById('optRandom').checked) opts.sort(() => Math.random() - 0.5);

        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt.text;
            btn.onclick = () => handleSelect(btn, opt.id, q.ans);
            container.appendChild(btn);
        });
        document.getElementById('mainBtn').innerText = q.ans.includes(",") ? "確認送出" : "下一題";
        document.getElementById('mainBtn').disabled = true;
    }

    function handleSelect(btn, id, ans) {
        if (!ans.includes(",")) { // 單選判定
            document.querySelectorAll('.opt-btn').forEach(b => b.onclick = null);
            if (id === ans) btn.classList.add('correct');
            else btn.classList.add('wrong');
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('mainBtn').classList.add('ready');
        } else { // 複選判定
            btn.classList.toggle('selected');
            if (selectedIds.includes(id)) selectedIds = selectedIds.filter(i => i !== id);
            else selectedIds.push(id);
            document.getElementById('mainBtn').disabled = selectedIds.length === 0;
            document.getElementById('mainBtn').classList.toggle('ready', selectedIds.length > 0);
        }
    }

    function handleAction() {
        if (document.getElementById('mainBtn').innerText === "確認送出") {
            const q = quizData[index];
            const isCorrect = selectedIds.sort().join(",") === q.ans.split(",").sort().join(",");
            alert(isCorrect ? "正確！" : "錯誤，答案是：" + q.ans);
            document.getElementById('mainBtn').innerText = "下一題";
        } else { index++; render(); }
    }
</script>
</body>
</html>
