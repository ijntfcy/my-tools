<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jexams 雲端測驗系統</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        
        /* 選單與控制項 */
        .menu-bar { display: flex; background: #E5E5EA; padding: 4px; border-radius: 12px; margin-bottom: 12px; }
        .menu-item { flex: 1; border: none; background: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .menu-item.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .control-panel { display: flex; justify-content: flex-start; gap: 20px; margin-bottom: 15px; padding-left: 5px; }
        .toggle-group { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: #48484A; }

        /* 題目卡片 */
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); margin-bottom: 15px; position: relative; }
        .subject-tag { position: absolute; top: 15px; left: 20px; background: #E8F0FE; color: var(--primary); font-size: 12px; padding: 4px 10px; border-radius: 6px; }
        .q-text { font-size: 1.3rem; font-weight: 700; line-height: 1.5; margin-top: 25px; }
        
        /* 選項按鈕 */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .opt-btn { background: white; border: 1.5px solid #E5E5EA; border-radius: 12px; padding: 16px; text-align: left; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .opt-btn.selected { border-color: var(--primary); background: #E8F0FE; }
        .opt-btn.correct { background: #34C759 !important; color: white !important; }
        .opt-btn.wrong { background: #FF3B30 !important; color: white !important; }
        
        .action-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; background: #D1D1D6; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .action-btn.ready { background: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <div class="menu-bar">
        <button class="menu-item" id="m-Jexams" onclick="changeSheet('Jexams')">Jexams</button>
        <button class="menu-item" id="m-擴充用1" onclick="changeSheet('擴充用1')">擴充用1</button>
        <button class="menu-item" id="m-擴充用2" onclick="changeSheet('擴充用2')">擴充用2</button>
    </div>

    <div class="control-panel">
        <label class="toggle-group"><input type="checkbox" id="qRandom" onchange="initQuiz()"> 題目隨機</label>
        <label class="toggle-group"><input type="checkbox" id="optRandom" onchange="render()"> 選項隨機</label>
    </div>

    <div class="card">
        <span id="subject" class="subject-tag">載入中</span>
        <div id="qText" class="q-text">讀取中...</div>
    </div>

    <div id="options" class="options-grid"></div>
    <button id="mainBtn" class="action-btn" onclick="handleAction()" disabled>下一題</button>
</div>

<script>
    // ⚠️ 確保這裡是您測試成功的網址
    const API_URL = "https://script.google.com/macros/s/AKfycbwqJXMzDORmYWyyZQqgx5fKCTzpBc8vkfwbJpfPZpa-EgHPU0MY5Zh5CSsZbyfPcuEXKQ/exec";
    let rawData = [], quizData = [], index = 0, selectedIds = [];

    const currentSheet = new URLSearchParams(window.location.search).get('sheet') || 'Jexams';
    document.getElementById(`m-${currentSheet}`).classList.add('active');

    window.onload = async () => {
        try {
            const resp = await fetch(`${API_URL}?sheet=${currentSheet}`);
            const json = await resp.json();
            // 關鍵修正：將 GAS 的資料轉化為標準格式
            let data = json["資料測試"] || json;
            
            // 1. 如果第一列是標題，就去掉
            if (data[0][2] === "題目" || data[0].q === "題目") data.shift();

            // 2. 轉換為物件格式
            rawData = data.map(r => {
                if (Array.isArray(r)) {
                    return { subject: r[0], ans: String(r[1]).toUpperCase(), q: r[2], opts: r.slice(3).filter(o => o !== "") };
                }
                return r;
            });

            initQuiz();
        } catch (e) { document.getElementById('qText').innerText = "資料解析失敗。"; }
    };

    function changeSheet(name) { window.location.search = `?sheet=${name}`; }
    function initQuiz() {
        quizData = document.getElementById('qRandom').checked ? [...rawData].sort(() => Math.random() - 0.5) : [...rawData];
        index = 0; render();
    }

    function render() {
        if (index >= quizData.length) { document.getElementById('qText').innerText = "測驗結束！"; return; }
        const q = quizData[index];
        document.getElementById('subject').innerText = q.subject || "未分類";
        document.getElementById('qText').innerText = q.q;
        
        const container = document.getElementById('options');
        container.innerHTML = "";
        selectedIds = [];

        // 自動生成選項：是非題補上 O/X
        let optsData = (q.opts && q.opts.length > 0) ? q.opts : ["O", "X"];
        let opts = optsData.map((t, i) => ({ text: t, id: (q.ans === "O" || q.ans === "X") ? t : (i + 1).toString() }));
        
        if (document.getElementById('optRandom').checked) opts.sort(() => Math.random() - 0.5);

        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn animate__animated fadeIn';
            btn.innerText = opt.text;
            btn.onclick = () => handleSelect(btn, opt.id, q.ans);
            container.appendChild(btn);
        });

        document.getElementById('mainBtn').innerText = q.ans.includes(",") ? "確認送出" : "下一題";
        document.getElementById('mainBtn').disabled = true;
        document.getElementById('mainBtn').classList.remove('ready');
    }

    function handleSelect(btn, id, ans) {
        if (!ans.includes(",")) {
            document.querySelectorAll('.opt-btn').forEach(b => b.onclick = null);
            if (id === ans) { btn.classList.add('correct'); } 
            else { btn.classList.add('wrong'); }
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('mainBtn').classList.add('ready');
        } else {
            btn.classList.toggle('selected');
            if (selectedIds.includes(id)) selectedIds = selectedIds.filter(i => i !== id);
            else selectedIds.push(id);
            document.getElementById('mainBtn').disabled = selectedIds.length === 0;
            document.getElementById('mainBtn').classList.toggle('ready', selectedIds.length > 0);
        }
    }

    function handleAction() {
        if (document.getElementById('mainBtn').innerText === "確認送出") {
            const q = quizData[index];
            const isCorrect = selectedIds.sort().join(",") === q.ans.split(",").sort().join(",");
            alert(isCorrect ? "正確！" : "錯誤，答案是：" + q.ans);
            document.getElementById('mainBtn').innerText = "下一題";
        } else { index++; render(); }
    }
</script>
</body>
</html>
