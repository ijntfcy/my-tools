<script>
    // 請填入您最新的部署網址
    const API_URL = "您的GAS網址"; 
    let rawData = [], quizData = [], index = 0, selectedIds = [];

    // 單選題與是非題的判斷邏輯
    function handleSelect(btn, id, ans) {
        if (!ans.includes(",")) { // 單選判定
            const allBtns = document.querySelectorAll('.opt-btn');
            allBtns.forEach(b => {
                b.onclick = null; // 禁止重複點擊
                // 如果按鈕的 ID 等於正確答案，變綠色
                if (b.dataset.id === ans) {
                    b.classList.add('correct');
                }
            });
            // 如果點選的 ID 不等於正確答案，點選的按鈕變紅色
            if (id !== ans) {
                btn.classList.add('wrong');
            }
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('mainBtn').classList.add('ready');
        } else { // 複選判定
            btn.classList.toggle('selected');
            // 管理複選清單...
        }
    }

    // 複選題按下「確認送出」後的顯示邏輯
    function handleAction() {
        const q = quizData[index];
        if (document.getElementById('mainBtn').innerText === "確認送出") {
            const correctArr = q.ans.split(",");
            document.querySelectorAll('.opt-btn').forEach(b => {
                b.onclick = null;
                const isCorrect = correctArr.includes(b.dataset.id);
                if (isCorrect) b.classList.add('correct'); // 正確答案顯綠
                if (b.classList.contains('selected') && !isCorrect) b.classList.add('wrong'); // 選錯顯紅
            });
            document.getElementById('mainBtn').innerText = "下一題";
        } else {
            index++;
            render();
        }
    }
</script>
