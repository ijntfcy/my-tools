<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Today - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- 引入拖曳排序庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root { 
            --bg: #F9F9F7; 
            --card: #FFFFFF; 
            --accent: #A68E74; 
            --text: #4A4A4A; 
            --text-dim: #9B9B9B; 
            --shadow: rgba(166, 142, 116, 0.12); 
            --danger: #e74c3c;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding-bottom: 100px;
        }

        .container { 
            width: 90%; 
            max-width: 480px; 
            padding: 40px 0; 
        }

        .profile { 
            text-align: center; 
            margin-bottom: 30px; 
            position: relative;
        }

        .avatar { 
            width: 70px; 
            height: 70px; 
            background: white; 
            border-radius: 22px; 
            margin: 0 auto 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border: 1px solid #F2EEE9; 
            font-size: 1.8rem; 
            color: var(--accent); 
            box-shadow: 0 8px 20px var(--shadow); 
        }

        .edit-toggle {
            position: absolute;
            right: 0;
            top: 0;
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.6;
            padding: 10px;
        }
        .edit-toggle.active { opacity: 1; color: var(--danger); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 16px; 
            width: 100%; 
        }

        .card { 
            background: var(--card); 
            border-radius: 28px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            aspect-ratio: 1/1; 
            text-decoration: none; 
            color: inherit; 
            transition: transform 0.2s ease, box-shadow 0.2s ease; 
            box-shadow: 0 8px 15px var(--shadow); 
            box-sizing: border-box; 
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            cursor: pointer;
        }

        .card:active { transform: scale(0.96); }

        /* 刪除按鈕 */
        .delete-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--danger);
            color: white;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            cursor: pointer;
            border: 2px solid white;
            z-index: 20;
        }

        /* 編輯小圖示 (管理模式) */
        .edit-hint {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 0.7rem;
            color: var(--accent);
            display: none;
        }

        .is-editing .delete-btn, 
        .is-editing .edit-hint { display: flex; }
        
        /* 拖曳時的視覺效果 */
        .sortable-ghost { opacity: 0.3; transform: scale(0.9); }
        .sortable-drag { cursor: grabbing; }

        .card i { font-size: 1.6rem; color: var(--accent); margin-bottom: 10px; pointer-events: none; }
        .card-title { font-weight: 700; font-size: 1rem; line-height: 1.3; color: var(--text); pointer-events: none; }
        .card-subtitle { color: var(--text-dim); font-size: 0.8rem; margin-top: 2px; pointer-events: none; }

        /* 時間卡片禁止拖曳 */
        .card-wide { grid-column: span 2; aspect-ratio: unset; height: auto; padding: 25px; cursor: default; }
        .clock { font-size: 2.2rem; font-weight: 800; margin-top: 5px; letter-spacing: -1px; }

        /* 新增按鈕 */
        .add-card {
            border: 2px dashed var(--accent);
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: none;
        }
        .add-card i { font-size: 2rem; margin: 0; opacity: 0.5; }

        /* Modal 彈窗 */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 30px;
            width: 85%;
            max-width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .modal-content h2 { margin-top: 0; font-size: 1.2rem; color: var(--accent); }
        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #EEE;
            border-radius: 12px;
            box-sizing: border-box;
            background: #FDFDFD;
        }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            transition: 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-ghost { background: #F2EEE9; color: var(--text); }
        .btn:active { transform: scale(0.95); }

        #toast {
            position: fixed; bottom: 30px; background: rgba(74, 74, 74, 0.9);
            color: white; padding: 12px 24px; border-radius: 50px;
            font-size: 0.9rem; opacity: 0; transition: opacity 0.3s;
            pointer-events: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="profile">
        <button class="edit-toggle" onclick="toggleEditMode()" id="toggleBtn">
            <i class="fas fa-cog"></i>
        </button>
        <div class="avatar"><i class="fas fa-feather-alt"></i></div>
        <h1 style="font-size: 1.4rem; font-weight: 800;">Hello, Today.</h1>
    </div>

    <div class="grid" id="cardGrid">
        <!-- 時間卡片 (靜態) -->
        <div class="card card-wide no-drag" id="timeCard">
            <div id="date" style="color: var(--accent); font-size: 0.85rem; font-weight: 700; letter-spacing: 0.5px;">LOADING...</div>
            <div id="clock" class="clock">00:00:00</div>
        </div>
        
        <!-- 動態生成的卡片容器 -->
        <div id="dynamicCards" style="display: contents;"></div>

        <!-- 新增按鈕 (僅編輯模式顯示) -->
        <div class="card add-card" id="addBtnContainer" style="display: none;" onclick="openModal()">
            <i class="fas fa-plus"></i>
        </div>
    </div>
</div>

<!-- 新增/編輯彈窗 -->
<div class="modal" id="cardModal">
    <div class="modal-content">
        <h2 id="modalTitle">新增功能連結</h2>
        <input type="text" id="inputTitle" placeholder="名稱 (例如: 雲端測驗)">
        <input type="text" id="inputSubtitle" placeholder="副標題 (例如: Exams)">
        <input type="text" id="inputUrl" placeholder="連結網址 (https://...)">
        <input type="text" id="inputIcon" placeholder="圖標代碼 (例如: fa-book)">
        <div class="modal-actions">
            <button class="btn btn-ghost" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveCard()">確認</button>
        </div>
    </div>
</div>

<div id="toast">訊息內容</div>

<script>
    // 預設資料
    const defaultCards = [
        { id: Date.now() + 1, title: "資產帳本", subtitle: "Balance", url: "assets/index.html", icon: "fa-wallet" },
        { id: Date.now() + 2, title: "生活隨筆", subtitle: "Daily", url: "#", icon: "fa-coffee", isAlert: true },
        { id: Date.now() + 3, title: "雲端測驗測試版", subtitle: "Exams Index", url: "https://ijntfcy.github.io/my-tools/Pastexams/index.html", icon: "fa-book-open" },
        { id: Date.now() + 4, title: "雲端測驗 114-2", subtitle: "Exams 114-2", url: "https://ijntfcy.github.io/my-tools/Pastexams/114-2.html", icon: "fa-graduation-cap" },
        { id: Date.now() + 5, title: "雲端測驗 114-2 Sleep", subtitle: "Exams Sleep", url: "https://ijntfcy.github.io/my-tools/Pastexams/114-2sleep.html", icon: "fa-moon" }
    ];

    let cards = JSON.parse(localStorage.getItem('myDashboardCards')) || defaultCards;
    let isEditing = false;
    let currentEditId = null;
    let sortableInstance = null;

    // 渲染卡片
    function renderCards() {
        const container = document.getElementById('dynamicCards');
        container.innerHTML = '';

        cards.forEach((card) => {
            const cardEl = document.createElement('div');
            cardEl.className = 'card';
            cardEl.dataset.id = card.id;
            
            // 處理點擊行為
            cardEl.onclick = (e) => {
                if (isEditing) {
                    openModal(card.id);
                } else if (card.isAlert) {
                    showToast('模組建設中...');
                } else {
                    window.location.href = card.url;
                }
            };

            cardEl.innerHTML = `
                <button class="delete-btn" onclick="deleteCard(event, ${card.id})"><i class="fas fa-times"></i></button>
                <i class="fas ${card.icon}"></i>
                <div>
                    <div class="card-title">${card.title}</div>
                    <div class="card-subtitle">${card.subtitle}</div>
                </div>
                <div class="edit-hint"><i class="fas fa-pen"></i></div>
            `;
            container.appendChild(cardEl);
        });

        // 處理新增按鈕顯示
        document.getElementById('addBtnContainer').style.display = isEditing ? 'flex' : 'none';
        
        // 更新拖曳實例
        initSortable();
    }

    // 初始化拖曳功能
    function initSortable() {
        const el = document.getElementById('dynamicCards');
        if (sortableInstance) sortableInstance.destroy();
        
        sortableInstance = new Sortable(el, {
            animation: 150,
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag',
            disabled: !isEditing, // 只有編輯模式能拖曳
            onEnd: function () {
                // 根據 DOM 順序重新排列 cards 陣列
                const newOrderIds = Array.from(el.children).map(child => child.dataset.id);
                const reorderedCards = newOrderIds.map(id => cards.find(c => c.id == id));
                cards = reorderedCards;
                saveData();
            }
        });
    }

    // 管理模式切換
    function toggleEditMode() {
        isEditing = !isEditing;
        const btn = document.getElementById('toggleBtn');
        const grid = document.getElementById('cardGrid');
        
        if (isEditing) {
            btn.classList.add('active');
            grid.classList.add('is-editing');
            showToast('編輯模式：點擊卡片修改，長按拖曳排序');
        } else {
            btn.classList.remove('active');
            grid.classList.remove('is-editing');
            showToast('已儲存變更');
        }
        renderCards();
    }

    // 刪除卡片
    function deleteCard(event, id) {
        event.stopPropagation();
        cards = cards.filter(c => c.id !== id);
        saveData();
        renderCards();
    }

    // 彈窗控制
    function openModal(id = null) {
        currentEditId = id;
        const modal = document.getElementById('cardModal');
        const titleLabel = document.getElementById('modalTitle');
        
        if (id) {
            const card = cards.find(c => c.id === id);
            titleLabel.innerText = "編輯卡片";
            document.getElementById('inputTitle').value = card.title;
            document.getElementById('inputSubtitle').value = card.subtitle;
            document.getElementById('inputUrl').value = card.url;
            document.getElementById('inputIcon').value = card.icon;
        } else {
            titleLabel.innerText = "新增功能連結";
            document.getElementById('inputTitle').value = '';
            document.getElementById('inputSubtitle').value = '';
            document.getElementById('inputUrl').value = '';
            document.getElementById('inputIcon').value = 'fa-link';
        }
        
        modal.style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('cardModal').style.display = 'none';
    }

    function saveCard() {
        const title = document.getElementById('inputTitle').value;
        const subtitle = document.getElementById('inputSubtitle').value;
        const url = document.getElementById('inputUrl').value;
        const icon = document.getElementById('inputIcon').value || 'fa-link';

        if (!title || !url) {
            showToast('名稱與連結不能為空');
            return;
        }

        if (currentEditId) {
            // 編輯
            const idx = cards.findIndex(c => c.id === currentEditId);
            cards[idx] = { ...cards[idx], title, subtitle, url, icon };
        } else {
            // 新增
            cards.push({ id: Date.now(), title, subtitle, url, icon });
        }

        saveData();
        renderCards();
        closeModal();
    }

    function saveData() {
        localStorage.setItem('myDashboardCards', JSON.stringify(cards));
    }

    // 時間功能
    function updateTime() {
        const now = new Date();
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('date').innerText = now.toLocaleDateString('zh-TW', dateOptions).toUpperCase();
        document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB');
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 3000);
    }

    setInterval(updateTime, 1000); 
    updateTime();
    renderCards();
</script>

</body>
</html>
