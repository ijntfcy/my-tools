<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的資產負債表</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f2f2f7; --card: #ffffff; --primary: #007aff; --danger: #ff3b30; --success: #34c759; }
        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 0; }
        
        /* 頂部固定功能列 */
        .header { background: white; padding: 15px; border-bottom: 1px solid #d1d1d6; position: sticky; top: 0; z-index: 100; display: none; }
        .toolbar { display: flex; gap: 10px; max-width: 500px; margin: 0 auto; }
        
        .btn { flex: 1; padding: 10px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; color: white; }
        .btn-sync { background: var(--success); }
        .btn-logout { background: var(--danger); }

        .container { padding: 12px; max-width: 500px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 16px; padding: 18px; margin-bottom: 12px; border-left: 6px solid var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card.test-account { border-left-color: #ff9500 !important; background: #fffaf0 !important; }
        .card-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 12px; color: var(--primary); }
        .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f9f9f9; }
        .label { color: #8e8e93; font-size: 0.9rem; }
        .value { font-weight: 600; }
        .high-rate { color: var(--danger); font-weight: 800; }

        /* 鎖定層 */
        .overlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .modal { background: white; padding: 30px; border-radius: 24px; text-align: center; width: 85%; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 1.5rem; text-align: center; }
    </style>
</head>
<body>

<div id="loginOverlay" class="overlay">
    <div class="modal">
        <h2>🔓 帳戶解鎖</h2>
        <input type="password" id="accPwd" placeholder="••••" inputmode="numeric">
        <button onclick="login()" style="width:100%; padding:15px; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:bold;">進入系統</button>
    </div>
</div>

<div id="header" class="header">
    <div class="toolbar">
        <button class="btn btn-sync" onclick="fetchData()"><i class="fas fa-sync"></i> 同步</button>
        <button class="btn btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 登出</button>
    </div>
</div>

<div class="container" id="dataList"></div>

<script>
    const CONFIG = {
        API_URL: "https://script.google.com/macros/s/AKfycbwU42wa6M0JXwxDXetSH37-QwDGxNu1tbqbiM80tag-qzNC9Vmckf5UgnfCKAurptZb/exec", 
        PWD_LIST: ["8888", "abcd1234", "9999"] 
    };

    // 使用 sessionStorage，關閉分頁或重新整理就會清除
    let CURRENT_PWD = sessionStorage.getItem('temp_pwd') || "";

    window.onload = () => {
        if(CURRENT_PWD) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('header').style.display = 'block';
            fetchData();
        }
    };

    function login() {
        const pwd = document.getElementById('accPwd').value;
        if(CONFIG.PWD_LIST.includes(pwd)) {
            CURRENT_PWD = pwd;
            sessionStorage.setItem('temp_pwd', pwd); // 關鍵：改用 sessionStorage
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('header').style.display = 'block';
            fetchData();
        } else { alert("代碼錯誤"); }
    }

    function logout() {
        sessionStorage.removeItem('temp_pwd');
        location.reload(); // 重新整理網頁，回到解鎖畫面
    }

    async function fetchData() {
        const list = document.getElementById('dataList');
        list.innerHTML = "<div style='text-align:center;padding:50px;'>🔄 同步中...</div>";
        try {
            const res = await fetch(`${CONFIG.API_URL}?pwd=${CURRENT_PWD}`);
            const json = await res.json();
            if(json.status === "success") render(json.headers, json.data);
            else { alert("驗證失效，請重新登入"); logout(); }
        } catch(e) { list.innerHTML = "❌ 連線失敗"; }
    }

    function render(headers, data) {
        document.getElementById('dataList').innerHTML = data.map(item => {
            const isTest = Object.values(item).some(v => String(v).includes('test帳戶'));
            let rows = headers.map(h => {
                let val = item[h];
                let valClass = (h.includes('利率') && parseFloat(val) >= 0.015) ? 'value high-rate' : 'value';
                if (h.includes('利率')) val = (parseFloat(val) * 100).toFixed(2) + '%';
                if (h.includes('金額')) val = Number(val).toLocaleString();
                return `<div class="row"><span class="label">${h}</span><span class="${valClass}">${val || '-'}</span></div>`;
            }).join('');
            return `<div class="card ${isTest ? 'test-account' : ''}"><div class="card-title">${item['帳戶名稱'] || '未命名'}</div>${rows}</div>`;
        }).join('');
    }
</script>
</body>
</html>
