<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Terminal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #000000; --card-bg: #1c1c1e; --border: rgba(255, 255, 255, 0.1); --accent: #0A84FF; --text: #ffffff; --text-dim: #8E8E93; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 90%; max-width: 500px; padding: 40px 0; }
        .profile { text-align: center; margin-bottom: 40px; }
        .avatar { width: 80px; height: 80px; background: linear-gradient(135deg, #1c1c1e, #3a3a3c); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); font-size: 2rem; }
        .status-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(48, 209, 88, 0.1); color: #30D158; padding: 6px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; border: 1px solid rgba(48, 209, 88, 0.2); }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%; }
        
        /* 修正卡片顯示問題 */
        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            border-radius: 24px; 
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            aspect-ratio: 1/1; 
            text-decoration: none !important; 
            color: white !important; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }
        .card:hover { border-color: var(--accent); background: #2c2c2e; }
        .card:active { transform: scale(0.96); }
        .card i { font-size: 1.8rem; color: var(--accent); margin-bottom: 10px; }
        .card-title { font-weight: 700; font-size: 1.15rem; display: block; margin-top: 10px; color: #ffffff; }
        .card-desc { color: var(--text-dim); font-size: 0.85rem; margin-top: 6px; display: block; }
        
        .card-wide { grid-column: span 2; aspect-ratio: unset; height: 120px; }
        .clock { font-size: 2.2rem; font-weight: 700; margin-top: 5px; font-family: 'SF Mono', monospace; }
    </style>
</head>
<body>
<div class="container">
    <div class="profile">
        <div class="avatar"><i class="fas fa-user-shield"></i></div>
        <h1 style="margin: 10px 0 8px; font-size: 1.6rem;">Digital Terminal</h1>
        <div class="status-badge"><i class="fas fa-circle" style="font-size: 0.5rem;"></i> System Encrypted</div>
    </div>
    <div class="grid">
        <div class="card card-wide">
            <div id="date-display" style="color: var(--accent); font-size: 0.85rem; font-weight: 800;">LOADING...</div>
            <div id="clock-display" class="clock">00:00:00</div>
        </div>

        <a href="assets/index.html" class="card">
            <i class="fas fa-vault"></i>
            <div>
                <span class="card-title">Vault System</span>
                <span class="card-desc">Asset Console</span>
            </div>
        </a>

        <div class="card" onclick="alert('Kernel v2.4.0 is stable.')">
            <i class="fas fa-microchip"></i>
            <div>
                <span class="card-title">Kernel</span>
                <span class="card-desc">Core System</span>
            </div>
        </div>
    </div>
</div>
<script>
    function updateClock() {
        const now = new Date();
        document.getElementById('date-display').innerText = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();
        document.getElementById('clock-display').innerText = now.toLocaleTimeString('en-US', { hour12: false });
    }
    setInterval(updateClock, 1000); updateClock();
</script>
</body>
</html>
