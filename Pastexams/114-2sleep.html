<style>:root{--saas-brand:#3182CE;--saas-bg:#F8FAFC;--vintage-bg:#F5F0E8;--vintage-ink:#2D241E;--vintage-paper:#FFFDF9;--color-tf:#ED8936;--color-single:#3182CE;--color-multi:#9F7AEA;--error-red:#E53E3E;--correct-green:#38B2AC;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:'Inter',"PingFang TC","Microsoft JhengHei",sans-serif;background:var(--saas-bg);color:#1A202C;-webkit-text-size-adjust:none;overflow-x:hidden;min-height:100vh;transition:opacity .2s ease}body.is-logging-out{background:#fff!important;opacity:0!important;pointer-events:none!important}#login-screen{position:fixed;inset:0;background:#F7F9FB;display:flex;align-items:center;justify-content:center;z-index:10000;padding:15px}.login-box{width:100%;max-width:360px;padding:35px 25px;background:#fff;border-radius:30px;box-shadow:0 8px 25px rgba(0,0,0,.04);text-align:center}.login-title{font-size:1.8rem;font-weight:800;color:var(--saas-brand);margin-bottom:20px;letter-spacing:-1px}.input-group input{width:100%;padding:14px;border-radius:14px;border:2px solid #EDF2F7;background:#fff;font-size:1rem;text-align:center;margin-bottom:15px;outline:0;transition:all .3s ease}.input-group input.error{border-color:var(--error-red);background-color:#FFF5F5;animation:shake .4s ease-in-out}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}.login-btn{width:100%;padding:15px;border-radius:16px;border:none;background:var(--saas-brand);color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;margin-bottom:15px}.login-footer-info{font-size:.8rem;color:#A0AEC0}#login-humor-text{min-height:1.2em;font-weight:600;transition:all .5s ease;opacity:1}#login-humor-text.fade{opacity:0;transform:translateY(5px)}#login-humor-text.error-msg{color:var(--error-red)}.version-info{font-size:.65rem;color:#CBD5E0;margin-top:10px;font-family:monospace}#main-ui{display:none;opacity:0;max-width:500px;margin:0 auto;padding:calc(8px + var(--safe-top)) 12px var(--safe-bottom)}body.vintage-mode{background:var(--vintage-bg)}.controls-row{display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,.05);padding:8px;border-radius:14px;margin-bottom:10px;gap:8px;border:1px solid #E2E8F0}.sheet-mini-tabs-container{flex:1;overflow:hidden}.sheet-mini-tabs{display:flex;gap:6px;padding:2px 0;overflow-x:auto;scrollbar-width:none}.sheet-mini-tabs::-webkit-scrollbar{display:none}.mini-tab{padding:8px 16px;font-size:.8rem;font-weight:800;border:none;background:rgba(0,0,0,.05);border-radius:10px;color:#718096;cursor:pointer;white-space:nowrap;transition:.2s}.mini-tab.active{background:#fff;color:var(--vintage-ink);box-shadow:0 2px 5px rgba(0,0,0,.08);border:1px solid #E2E8F0}.top-actions{display:flex;align-items:center;gap:12px;padding-right:4px}.filter-section{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}.tag-nav-row{display:flex;align-items:center;gap:4px;background:rgba(0,0,0,.03);padding:4px;border-radius:12px}.nav-arrow-small{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:#fff;border-radius:6px;border:1px solid #E2E8F0;font-size:.6rem;cursor:pointer;flex-shrink:0}.filter-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:2px 0;scroll-behavior:smooth;flex:1}.filter-row::-webkit-scrollbar{display:none}.filter-btn{white-space:nowrap;padding:6px 14px;border-radius:8px;border:none;background:rgba(0,0,0,.05);color:#718096;font-size:.75rem;font-weight:700}.filter-btn.active{background:var(--saas-brand);color:#fff}.info-bar{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;padding:0 4px}.top-info-row{display:flex;justify-content:space-between;align-items:center}.q-meta-left{font-size:.75rem;color:#718096;font-weight:800;display:flex;align-items:center;gap:4px}.center-stats-row{display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(0,0,0,.03);padding:6px;border-radius:12px}.timer-box{display:flex;flex-direction:column;align-items:center;min-width:60px}.timer-label{font-size:.55rem;color:#A0AEC0;font-weight:800}.timer-val{font-size:.8rem;font-weight:900;color:var(--vintage-ink);font-family:monospace}.progress-pill{background:var(--vintage-ink);color:#fff;padding:5px 15px;border-radius:15px;font-size:.85rem;font-weight:900;min-width:80px;text-align:center}.switch-group{display:flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;color:#4A5568}.switch{position:relative;display:inline-block;width:28px;height:16px}.switch input{opacity:0;width:0;height:0}.slider{position:absolute;cursor:pointer;inset:0;background-color:#CBD5E0;transition:.3s;border-radius:20px}.slider:before{position:absolute;content:"";height:12px;width:12px;left:2px;bottom:2px;background-color:#fff;transition:.3s;border-radius:50%}input:checked+.slider{background-color:var(--saas-brand)}input:checked+.slider:before{transform:translateX(12px)}.card{background:var(--vintage-paper);border:1.5px solid #E2E8F0;padding:20px;border-radius:18px;margin-bottom:12px;box-shadow:0 4px 15px rgba(0,0,0,.02)}.q-text{font-size:1.15rem;line-height:1.6;font-weight:800;color:var(--vintage-ink)}.type-tag{padding:2px 6px;border-radius:4px;color:#fff;font-size:.65rem;font-weight:800}.type-tf{background:var(--color-tf)}.type-single{background:var(--color-single)}.type-multi{background:var(--color-multi)}.options-grid{display:grid;gap:8px}.opt{background:var(--vintage-paper);border:1.5px solid #E2E8F0;padding:14px 16px;display:flex;align-items:center;font-size:1rem;border-radius:14px;cursor:pointer;transition:.2s;color:var(--vintage-ink);font-weight:600}.opt-num{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:var(--saas-brand);color:#fff;border-radius:50%;margin-right:12px;font-size:.85rem;font-weight:900}.opt.selected{background:#EBF8FF;border:2px solid var(--saas-brand)}.opt.correct-hit{background:#E6FFFA!important;border:2.5px solid var(--correct-green)!important}.opt.correct-miss{background:transparent!important;border:2.5px dashed var(--correct-green)!important}.opt.wrong-hit{background:#FFF5F5!important;border:2.5px solid var(--error-red)!important}.ans-hint{margin-top:12px;padding:15px;background:#FFF9E6;border-left:5px solid #F6AD55;font-size:.95rem;font-weight:700;border-radius:14px;display:none}.action-btn{width:100%;padding:16px;background:var(--vintage-ink);color:#fff;border:none;font-size:1.1rem;font-weight:800;border-radius:18px;box-shadow:0 4px 12px rgba(0,0,0,.1);margin-top:12px;cursor:pointer}.action-btn:disabled{opacity:.5}.icon-btn{background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#718096;transition:.2s}.icon-btn:active{transform:scale(.9);opacity:.5}.icon-btn svg{width:22px;height:22px;fill:currentColor}#humor-toast{display:block;text-align:center;margin-top:12px;font-size:.8rem;color:#A0AEC0;font-style:italic;min-height:1.2em}#loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s}#loading-overlay.show{opacity:1;pointer-events:auto}.spinner{width:35px;height:35px;border:4px solid #EDF2F7;border-top-color:var(--saas-brand);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}@keyframes spin{to{transform:rotate(360deg)}}</style></head>
<body onmousedown="updateActivityTime()" onkeydown="updateActivityTime()" ontouchstart="updateActivityTime()"><div id="login-screen"><div class="login-box"><h1 class="login-title">記憶力告解室</h1><div class="input-group"><input type="password" id="pw-input" placeholder="請輸入海巡生存模擬器密碼" inputmode="numeric" oninput="clearError()"></div><button class="login-btn" onclick="handleLogin()">開啟題海無涯，回頭沒報名費模式</button><div class="login-footer-info"><p id="login-humor-text">瘋狂載入中...</p><div class="version-info" id="app-version-label">V9.3.0 Active</div></div></div></div><div id="main-ui"><div class="controls-row"><div class="sheet-mini-tabs-container"><div class="sheet-mini-tabs" id="sheet-mini-tabs"></div></div><div class="top-actions"><button class="icon-btn" onclick="softRefresh()" title="重新載入題目"><svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg></button><button class="icon-btn" onclick="logout('主動登出')" title="安全退出"><svg viewBox="0 0 24 24"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg></button></div></div><div class="filter-section"><div class="filter-row" id="type-filters"><button class="filter-btn active" onclick="filterByType('全部', this)">全部</button><button class="filter-btn" onclick="filterByType('是非', this)">是非</button><button class="filter-btn" onclick="filterByType('單選', this)">單選</button><button class="filter-btn" onclick="filterByType('多選', this)">多選</button></div><div class="tag-nav-row"><button class="nav-arrow-small" onclick="scrollTags(-80)">◀</button><div class="filter-row" id="tag-filters"></div><button class="nav-arrow-small" onclick="scrollTags(80)">▶</button></div></div><div class="info-bar"><div class="top-info-row"><div class="q-meta-left" id="q-meta-info"></div><div style="display:flex;gap:8px;"><div class="switch-group"><span id="label-randQ">隨機出題</span><label class="switch"><input type="checkbox" id="randQ" checked onchange="initQuiz()"><span class="slider"></span></label></div><div class="switch-group"><span id="label-randO">亂序選項</span><label class="switch"><input type="checkbox" id="randO" checked onchange="renderQuestion()"><span class="slider"></span></label></div></div></div><div class="center-stats-row"><div class="timer-box"><span class="timer-label">總時數</span><span id="total-timer" class="timer-val">00:00</span></div><div class="progress-pill" id="progress-text">0 / 0</div><div class="timer-box"><span class="timer-label">本題</span><span id="q-timer" class="timer-val">00:00</span></div></div></div><div class="quiz-container"><div class="card"><div class="q-text" id="q-text">正在準備題目中...</div></div><div class="options-grid" id="options-grid"></div><div class="ans-hint" id="ans-panel"><span style="color:#C05621">💡 正確解析：</span><span id="ans-ids" style="color:#2B6CB0; font-weight:900;"></span><div id="ans-text" style="font-size:.85rem;margin-top:6px;border-top:1px dashed #DDD;padding-top:6px;color:#4A5568;"></div></div><button class="action-btn" id="action-btn" disabled>請選擇答案</button><span id="humor-toast"></span></div></div><div id="loading-overlay"><div class="spinner"></div><div id="loading-text" style="font-weight:800; color:var(--saas-brand);">努力加載中...</div></div>
<script>const SYSTEM_SETTINGS={apiUrl:"https://script.google.com/macros/s/AKfycbxwm82CukADyBeojtrhrajO3ufhsNtHtlz3XkUD79bboCpKKtP8SzvNHVkmjyTo3Uzf/exec",authKey:"auth_v9_3",sessionExpireHours:null,version:"2026/04/18 01:31 V9.3.2 熬夜報肝版"};const LOGIN_QUOTES=["書到用時方恨少，肉到考前甩不掉。","人家是『一目十行』，我是『看一行忘十行』。","世界上最遙遠的距離，是題目就在眼前，答案卻在腦後。","只要我不尷尬，尷尬的就是題目。"];const ERROR_QUOTES=["密碼拒絕溝通，除非你給它一點正確的資訊。","這密碼的正確率比中樂透的機率還低，再試一次吧！"];const HUMOR_QUOTES=["系統剛幫你算了一卦，你今天的考運呈現上升曲線。","這題只是在測試你的抗壓性","知識就像肌肉，越練會越強大，加油！"];const UI_TEXT={randomQuestion:"<span>題海戰術隨機</span>",randomOption:"<span>打破慣性思考</span>",refreshQuotes:["正在拼命搬運題目...","正在為你的大腦暖機...","同步數據中，請稍候..."],loading:"努力加載中..."};let rawData=[],currentPool=[],filteredList=[],currentIndex=0,currentSheet="",allSheets=[],currentTypeFilter="全部",currentTagFilter="全部",totalTime=0,qTime=0,quizTimer=null,lastActivityTime=Date.now(),isPageVisible=!0,tabSwitchCount=0,userIpAddress="Unknown",loginHumorTimer=null,currentLoginQuoteIndex=0;const DOM={};window.onload=async()=>{initDOM();applySettings();startLoginHumorCycle();setupVisibilityListener();try{const ipRes=await fetch('https://api.ipify.org?format=json');const ipData=await ipRes.json();userIpAddress=ipData.ip;}catch(e){}if(localStorage.getItem(SYSTEM_SETTINGS.authKey)==="true"){showLoading("正在驗證安全連線...");try{const res=await fetch(`${SYSTEM_SETTINGS.apiUrl}?type=checkSession&ip=${userIpAddress}`);const result=await res.json();hideLoading();if(result.valid){SYSTEM_SETTINGS.sessionExpireHours=result.expireHours;enterApp();setupSecurityWatch();}else{localStorage.removeItem(SYSTEM_SETTINGS.authKey);localStorage.removeItem('loginTimestamp');DOM.mainUI.style.display='none';updateLoginHumorText("登入時效已過，請重新輸入密碼",!0);}}catch(e){hideLoading();DOM.mainUI.style.display='none';}}else{DOM.mainUI.style.display='none';}};function initDOM(){DOM.loginScreen=document.getElementById('login-screen');DOM.mainUI=document.getElementById('main-ui');DOM.pwInput=document.getElementById('pw-input');DOM.loginHumor=document.getElementById('login-humor-text');DOM.grid=document.getElementById('options-grid');DOM.btn=document.getElementById('action-btn');DOM.metaInfo=document.getElementById('q-meta-info');DOM.humor=document.getElementById('humor-toast');DOM.ansPanel=document.getElementById('ans-panel');DOM.ansIds=document.getElementById('ans-ids');DOM.ansText=document.getElementById('ans-text');DOM.qText=document.getElementById('q-text');DOM.progress=document.getElementById('progress-text');DOM.totalTimer=document.getElementById('total-timer');DOM.qTimer=document.getElementById('q-timer');DOM.loading=document.getElementById('loading-overlay');DOM.loadingText=document.getElementById('loading-text');DOM.miniTabs=document.getElementById('sheet-mini-tabs');DOM.tagFilters=document.getElementById('tag-filters');DOM.versionLabel=document.getElementById('app-version-label');DOM.labelRandQ=document.getElementById('label-randQ');DOM.labelRandO=document.getElementById('label-randO');}function applySettings(){DOM.versionLabel.innerText=SYSTEM_SETTINGS.version;DOM.labelRandQ.innerHTML=UI_TEXT.randomQuestion;DOM.labelRandO.innerHTML=UI_TEXT.randomOption;DOM.loadingText.innerText=UI_TEXT.loading;}function setupSecurityWatch(){setInterval(()=>{if(localStorage.getItem(SYSTEM_SETTINGS.authKey)==="true"){const loginTime=localStorage.getItem('loginTimestamp');if(loginTime&&SYSTEM_SETTINGS.sessionExpireHours){const elapsed=Date.now()-parseInt(loginTime,10);const expireMs=SYSTEM_SETTINGS.sessionExpireHours*3600*1000;if(elapsed>expireMs){logout('登入時效過期');}}}},5000);}function setupVisibilityListener(){document.addEventListener("visibilitychange",()=>{if(document.hidden){isPageVisible=!1;tabSwitchCount++;}else{isPageVisible=!0;updateActivityTime();}});}function updateActivityTime(){lastActivityTime=Date.now();}function startLoginHumorCycle(){if(loginHumorTimer)clearInterval(loginHumorTimer);updateLoginHumorText(LOGIN_QUOTES[currentLoginQuoteIndex]);loginHumorTimer=setInterval(()=>{if(DOM.loginHumor.classList.contains('error-msg'))return;currentLoginQuoteIndex=(currentLoginQuoteIndex+1)%LOGIN_QUOTES.length;cycleQuoteText(LOGIN_QUOTES[currentLoginQuoteIndex]);},4000);}function cycleQuoteText(text){DOM.loginHumor.classList.add('fade');setTimeout(()=>{DOM.loginHumor.innerText=text;DOM.loginHumor.classList.remove('fade');},500);}function updateLoginHumorText(text,isError=!1){DOM.loginHumor.innerText=text;if(isError){DOM.loginHumor.classList.add('error-msg');setTimeout(()=>{DOM.loginHumor.classList.remove('error-msg');cycleQuoteText(LOGIN_QUOTES[currentLoginQuoteIndex]);},3000);}else{DOM.loginHumor.classList.remove('error-msg');}}function clearError(){DOM.pwInput.classList.remove('error');}async function handleLogin(){const pw=DOM.pwInput.value;if(!pw){DOM.pwInput.classList.add('error');return;}showLoading("正在驗證驗證碼...");try{const res=await fetch(`${SYSTEM_SETTINGS.apiUrl}?type=checkAuth&pw=${encodeURIComponent(pw)}&ua=${encodeURIComponent(navigator.userAgent)}&ip=${userIpAddress}`);const result=await res.json();hideLoading();if(result.auth){localStorage.setItem(SYSTEM_SETTINGS.authKey,"true");localStorage.setItem('loginTimestamp',Date.now().toString());SYSTEM_SETTINGS.sessionExpireHours=result.expireHours;updateActivityTime();enterApp();setupSecurityWatch();}else{DOM.pwInput.classList.add('error');DOM.pwInput.value="";updateLoginHumorText(ERROR_QUOTES[Math.floor(Math.random()*ERROR_QUOTES.length)],!0);}}catch(e){hideLoading();alert('系統連線繁忙，請重新嘗試。');}}function shuffleArray(array){for(let i=array.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]];}return array;}function enterApp(){document.body.classList.add('vintage-mode');DOM.loginScreen.style.display='none';DOM.mainUI.style.display='block';setTimeout(()=>DOM.mainUI.style.opacity='1',50);fetchInitialData();}async function fetchInitialData(){const refreshQuote=UI_TEXT.refreshQuotes[Math.floor(Math.random()*UI_TEXT.refreshQuotes.length)];showLoading(refreshQuote);try{const sRes=await fetch(`${SYSTEM_SETTINGS.apiUrl}?type=listSheets`);allSheets=await sRes.json();currentSheet=allSheets[0];renderMiniTabs();loadSheetData(currentSheet);}catch(e){hideLoading();}}function renderMiniTabs(){DOM.miniTabs.innerHTML=allSheets.map(s=>`<button class="mini-tab ${s===currentSheet?'active':''}" onclick="switchSheet('${s}', this)">${s}</button>`).join('');}async function loadSheetData(sheetName){currentSheet=sheetName;renderMiniTabs();showLoading(UI_TEXT.loading);try{const dRes=await fetch(`${SYSTEM_SETTINGS.apiUrl}?type=getQuestions&sheet=${encodeURIComponent(sheetName)}`);const data=await dRes.json();rawData=data.map((item,idx)=>{let ans=(item.ans||"").toString().toUpperCase().trim();let opts=(item.opts||[]).filter(o=>o!=="");let type="單選";if((ans==="O"||ans==="X")&&opts.length<=2){type="是非";}else if((ans==="1"||ans==="2")&&opts.length===2){type="是非";}else if(ans.length>1&&!["O","X"].includes(ans)){type="多選";}return{q:item.q,ans,options:opts,type,id:idx+1,tag:(item.subject||"通用").trim()};});renderTagFilters();hideLoading();initQuiz();}catch(e){hideLoading();DOM.qText.innerText="讀取資料庫失敗。";}}function renderTagFilters(){const tags=[...new Set(rawData.map(item=>item.tag))];DOM.tagFilters.innerHTML=`<button class="filter-btn active" onclick="filterByTag('全部', this)">全部</button>`+tags.map(tag=>`<button class="filter-btn" onclick="filterByTag('${tag}', this)">${tag}</button>`).join('');}function filterByType(type,el){currentTypeFilter=type;updateFilterUI('type-filters',el);initQuiz();}function filterByTag(tag,el){currentTagFilter=tag;updateFilterUI('tag-filters',el);initQuiz();}function updateFilterUI(pid,el){document.querySelectorAll(`#${pid} .filter-btn`).forEach(b=>b.classList.remove('active'));el.classList.add('active');}function switchSheet(name,el){if(name!==currentSheet){loadSheetData(name);if(el)el.scrollIntoView({behavior:'smooth',inline:'center'});}}function initQuiz(){currentPool=rawData.filter(i=>(currentTypeFilter==="全部"||i.type===currentTypeFilter)&&(currentTagFilter==="全部"||i.tag===currentTagFilter));filteredList=[...currentPool];if(document.getElementById('randQ').checked)shuffleArray(filteredList);currentIndex=0;totalTime=0;renderQuestion();}function renderQuestion(){DOM.ansPanel.style.display='none';DOM.grid.innerHTML="";DOM.humor.innerText="";if(!filteredList.length){DOM.qText.innerText="目前篩選條件下沒有題目";return;}if(currentIndex>=filteredList.length){DOM.qText.innerText="完成此輪練習！";DOM.btn.innerText="再來一輪";DOM.btn.onclick=initQuiz;return;}const q=filteredList[currentIndex];DOM.progress.innerText=`${currentIndex+1} / ${filteredList.length}`;let typeClass=q.type==="是非"?"type-tf":(q.type==="單選"?"type-single":"type-multi");DOM.metaInfo.innerHTML=`<span class="type-tag ${typeClass}">${q.type}</span> <span style="margin-left:5px;">序號:${q.id} | 分類:${q.tag}</span>`;DOM.qText.innerText=q.q;let opts=[];if(q.type==="是非"){let textO=q.options[0]||"O 正確";let textX=q.options[1]||"X 錯誤";if(q.ans==="O"||q.ans==="X"){opts=[{originalVal:"O",currentVal:"O",text:textO},{originalVal:"X",currentVal:"X",text:textX}];}else{opts=[{originalVal:"1",currentVal:"1",text:textO},{originalVal:"2",currentVal:"2",text:textX}];}}else{opts=q.options.map((t,i)=>({originalVal:(i+1).toString(),text:t}));if(document.getElementById('randO').checked){shuffleArray(opts);}opts.forEach((opt,idx)=>opt.currentVal=(idx+1).toString());}opts.forEach((o,index)=>{const div=document.createElement('div');div.className='opt';div.innerHTML=`<span class="opt-num">${o.currentVal}</span><span>${o.text}</span>`;div.onclick=()=>{updateActivityTime();if(q.type==="多選"){div.classList.toggle('selected');DOM.btn.disabled=!1;DOM.btn.innerText="確定選好了";DOM.btn.onclick=()=>judge(q,opts);}else{judge(q,opts,o.currentVal,div);}};DOM.grid.appendChild(div);});DOM.btn.innerText="請選取答案";DOM.btn.disabled=!0;qTime=0;startTimer();}function judge(q,curOpts,userAnsVal=null,el=null){clearInterval(quizTimer);const gridItems=document.querySelectorAll('.opt');gridItems.forEach(o=>o.onclick=null);const originalCorrectIDs=q.ans.split("");let currentCorrectIDs=[];let correctTexts=[];curOpts.forEach(oData=>{const isCorrect=originalCorrectIDs.includes(oData.originalVal);if(isCorrect){currentCorrectIDs.push(oData.currentVal);let label=`[${oData.currentVal}]`;correctTexts.push(`${label} ${oData.text}`);}});gridItems.forEach((o,idx)=>{const oData=curOpts[idx];const isCorrect=originalCorrectIDs.includes(oData.originalVal);const isSelected=o.classList.contains('selected')||oData.currentVal===userAnsVal;if(isCorrect&&isSelected)o.classList.add('correct-hit');else if(isCorrect&&!isSelected)o.classList.add('correct-miss');else if(!isCorrect&&isSelected)o.classList.add('wrong-hit');});DOM.ansIds.innerText=currentCorrectIDs.join("、");DOM.ansText.innerText=correctTexts.join("；");DOM.ansPanel.style.display='block';DOM.humor.innerText=HUMOR_QUOTES[Math.floor(Math.random()*HUMOR_QUOTES.length)];DOM.btn.innerText="繼續練習下一題";DOM.btn.disabled=!1;DOM.btn.onclick=()=>{currentIndex++;renderQuestion();};}function scrollTags(val){DOM.tagFilters.scrollBy({left:val,behavior:'smooth'});}function showLoading(text){DOM.loadingText.innerText=text;DOM.loading.classList.add('show');}function hideLoading(){DOM.loading.classList.remove('show');}function startTimer(){clearInterval(quizTimer);quizTimer=setInterval(()=>{qTime++;totalTime++;DOM.qTimer.innerText=formatTime(qTime);DOM.totalTimer.innerText=formatTime(totalTime);},1000);}function formatTime(sec){const m=Math.floor(sec/60).toString().padStart(2,'0');const s=(sec%60).toString().padStart(2,'0');return`${m}:${s}`;}function softRefresh(){fetchInitialData();}function logout(reason=''){localStorage.removeItem(SYSTEM_SETTINGS.authKey);localStorage.removeItem('loginTimestamp');fetch(`${SYSTEM_SETTINGS.apiUrl}?type=logout&reason=${encodeURIComponent(reason)}&tabs=${tabSwitchCount}`);document.body.classList.add('is-logging-out');setTimeout(()=>location.reload(),500);}</script></body></html>
