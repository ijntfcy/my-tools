<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jexams Pro - 專業增強版</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --success: #34C759; --danger: #FF3B30; --disabled: #AEAEB2; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        .card-box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; box-sizing: border-box; text-align: center; }
        .config-group { display: flex; justify-content: center; gap: 20px; margin: 20px 0; padding: 15px; background: #F8F8FA; border-radius: 12px; }
        .config-item { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .timer-row { width: 100%; display: flex; justify-content: space-between; margin-bottom: 12px; gap: 10px; }
        .timer-chip { flex: 1; background: white; padding: 10px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .timer-label { font-size: 11px; color: #8E8E93; display: block; }
        .timer-val { font-size: 16px; font-weight: 800; color: var(--primary); }
        .menu-bar { display: flex; background: #E5E5EA; padding: 4px; border-radius: 12px; margin-bottom: 15px; overflow-x: auto; width: 100%; gap: 4px; }
        .menu-item { flex: 1; border: none; background: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; white-space: nowrap; }
        .menu-item.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .quiz-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        .badge { background: #E8F0FE; color: var(--primary); font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: bold; margin-right: 5px; }
        .q-text { font-size: 1.2rem; font-weight: bold; line-height: 1.5; color: #1C1C1E; margin-top: 10px;}
        .options-grid { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .opt-btn { background: white; border: 2px solid #E5E5EA; border-radius: 15px; padding: 16px; text-align: left; cursor: pointer; font-size: 1.05rem; font-weight: 600; transition: 0.2s; }
        .opt-btn.selected { border-color: var(--primary); background: #F0F7FF; }
        .opt-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .opt-btn.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }
        .action-btn { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--disabled); color: white; font-size: 1.1rem; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .action-btn.ready { background: var(--primary); box-shadow: 0 5px 15px rgba(0,122,255,0.3); }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 12px; display: none; font-weight: bold; text-align: center; white-space: pre-line; }
    </style>
</head>
<body>

<div id="setupPage" class="container">
    <div class="card-box">
        <h2>測驗登入</h2>
        <input type="password" id="pwdInput" placeholder="請輸入密碼" style="width:100%; padding:15px; border-radius:12px; border:2px solid #EEE; margin:10px 0; text-align:center;">
        <div class="config-group">
            <label class="config-item"><input type="checkbox" id="randQ" checked> 題目隨機</label>
            <label class="config-item"><input type="checkbox" id="randO" checked> 選項隨機</label>
        </div>
        <button class="action-btn ready" onclick="checkAuth()">進入測驗</button>
    </div>
</div>

<div id="mainApp" class="container" style="display:none;">
    <div id="sheetMenu" class="menu-bar"></div>
    <div class="timer-row">
        <div class="timer-chip"><span class="timer-label">總計時</span><span class="timer-val" id="totalTime">0</span>s</div>
        <div class="timer-chip"><span class="timer-label">單題計時</span><span class="timer-val" id="singleTime">0</span>s</div>
    </div>
    <div class="quiz-card">
        <div><span id="subject" class="badge">科目</span><span id="qType" class="badge" style="background:#F2F2F7; color:#666;">類型</span><span id="progress" style="float:right; color:#888; font-size:12px;"></span></div>
        <div id="qText" class="q-text">載入中...</div>
        <div id="ansFeedback" class="feedback"></div>
    </div>
    <div id="options" class="options-grid"></div>
    <button id="mainBtn" class="action-btn" onclick="handleAction()" disabled>請先選擇答案</button>
</div>

<script>
    const FIXED_URL = "https://script.google.com/macros/s/AKfycbwqJXMzDORmYWyyZQqgx5fKCTzpBc8vkfwbJpfPZpa-EgHPU0MY5Zh5CSsZbyfPcuEXKQ/exec";
    let quizData = [], index = 0, isProcessing = false, totalSec = 0, singleSec = 0, totalTimer, singleTimer;
    let selectedIds = [], currentAns = "", isMulti = false, userKey = sessionStorage.getItem('quiz_auth');

    async function fetchData(params) {
        try {
            const resp = await fetch(`${FIXED_URL}?pwd=${encodeURIComponent(userKey)}&t=${Date.now()}&${params}`);
            return await resp.json();
        } catch (e) { return {error: "連線失敗"}; }
    }

    async function checkAuth() {
        userKey = document.getElementById('pwdInput').value;
        const test = await fetchData('type=listSheets');
        if (test && !test.error) {
            sessionStorage.setItem('quiz_auth', userKey);
            initQuiz(test);
        } else { alert("密碼錯誤或連線異常"); }
    }

    async function initQuiz(sheets) {
        document.getElementById('setupPage').style.display = "none";
        document.getElementById('mainApp').style.display = "block";
        const menu = document.getElementById('sheetMenu');
        const curSheet = new URLSearchParams(window.location.search).get('sheet') || sheets[0];
        sheets.forEach(name => {
            const btn = document.createElement('button');
            btn.className = `menu-item ${name === curSheet ? 'active' : ''}`;
            btn.innerText = name;
            btn.onclick = () => location.search = `?sheet=${encodeURIComponent(name)}`;
            menu.appendChild(btn);
        });

        const raw = await fetchData(`sheet=${encodeURIComponent(curSheet)}`);
        if (raw && Array.isArray(raw)) {
            quizData = document.getElementById('randQ').checked ? raw.sort(() => Math.random() - 0.5) : raw;
            totalTimer = setInterval(() => { totalSec++; document.getElementById('totalTime').innerText = totalSec; }, 1000);
            render();
        }
    }

    function render() {
        if (index >= quizData.length) {
            clearInterval(totalTimer); clearInterval(singleTimer);
            document.getElementById('qText').innerText = "🎉 測驗完成！總用時：" + totalSec + "秒";
            document.getElementById('options').innerHTML = "";
            document.getElementById('mainBtn').style.display = "none";
            return;
        }

        isProcessing = false; selectedIds = [];
        const q = quizData[index];
        currentAns = q.ans.toString().replace(/，/g, ',').toUpperCase().trim();
        isMulti = currentAns.includes(",");

        document.getElementById('progress').innerText = `${index + 1} / ${quizData.length}`;
        document.getElementById('subject').innerText = q.subject;
        document.getElementById('qType').innerText = isMulti ? "多選題" : "單選題";
        document.getElementById('qText').innerText = q.q;
        document.getElementById('ansFeedback').style.display = "none";
        
        let opts = q.opts.map((t, i) => ({ text: t, id: (i + 1).toString() }));
        if (document.getElementById('randO').checked) opts.sort(() => Math.random() - 0.5);

        const container = document.getElementById('options');
        container.innerHTML = "";
        opts.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt.text;
            btn.dataset.id = opt.id;
            btn.onclick = () => selectOption(btn);
            container.appendChild(btn);
        });

        updateBtn(false, "請選擇答案");
        singleSec = 0; document.getElementById('singleTime').innerText = "0";
        clearInterval(singleTimer);
        singleTimer = setInterval(() => { singleSec++; document.getElementById('singleTime').innerText = singleSec; }, 1000);
    }

    function selectOption(btn) {
        if (isProcessing) return;
        if (isMulti) {
            btn.classList.toggle('selected');
            selectedIds = Array.from(document.querySelectorAll('.opt-btn.selected')).map(b => b.dataset.id);
            updateBtn(selectedIds.length > 0, "送出答案");
        } else {
            selectedIds = [btn.dataset.id];
            judge();
        }
    }

    function judge() {
        clearInterval(singleTimer);
        isProcessing = true;
        const correctArr = currentAns.split(',').sort();
        const userArr = selectedIds.sort();
        const isCorrect = JSON.stringify(correctArr) === JSON.stringify(userArr);

        document.querySelectorAll('.opt-btn').forEach(btn => {
            const id = btn.dataset.id;
            if (correctArr.includes(id)) btn.classList.add('correct');
            else if (userArr.includes(id)) btn.classList.add('wrong');
        });

        const fb = document.getElementById('ansFeedback');
        fb.style.display = "block";
        fb.style.background = isCorrect ? "#E8F5E9" : "#FFEBEE";
        fb.style.color = isCorrect ? "#2E7D32" : "#C62828";
        fb.innerText = isCorrect ? `✨ 正確！(耗時：${singleSec}秒)` : `❌ 錯誤！正確答案：${currentAns}\n(耗時：${singleSec}秒)`;

        updateBtn(true, "下一題");
    }

    function handleAction() {
        const btn = document.getElementById('mainBtn');
        if (btn.innerText === "送出答案") judge();
        else if (btn.innerText === "下一題") { index++; render(); }
    }

    function updateBtn(ready, text) {
        const btn = document.getElementById('mainBtn');
        btn.disabled = !ready; btn.innerText = text;
        btn.classList.toggle('ready', ready);
    }

    window.onload = async () => { if (userKey) checkAuth(); };
</script>
</body>
</html>
