<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jexams 雲端測驗</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --success: #34C759; --danger: #FF3B30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; width: 100%; }
        
        /* 選單導航 */
        .menu-bar { display: flex; background: #E5E5EA; padding: 4px; border-radius: 12px; margin-bottom: 15px; overflow-x: auto; gap: 4px; }
        .menu-item { flex: 1; border: none; background: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; white-space: nowrap; transition: 0.2s; }
        .menu-item.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* 控制列 */
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%; }
        .controls { display: flex; gap: 12px; }
        .switch { display: inline-flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 600; color: #48484A; }
        .switch input { display: none; }
        .slider { width: 40px; height: 22px; background-color: #D1D1D6; border-radius: 20px; position: relative; transition: .3s; margin-right: 6px; }
        .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }
        .clear-btn { background: var(--danger); color: white; border: none; padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* 題目卡片 */
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: left; width: 100%; box-sizing: border-box; }
        .badge-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .badge { background: #E8F0FE; color: var(--primary); font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .badge-type { background: #F2F2F7; color: #666; }
        .q-text { font-size: 1.35rem; font-weight: bold; line-height: 1.5; color: #1C1C1E; }
        .info-row { display: flex; justify-content: space-between; font-size: 12px; color: #8E8E93; margin-bottom: 8px; width: 100%; }

        /* 選項按鈕 */
        .options-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .opt-btn { 
            background: white; border: 2px solid #E5E5EA; border-radius: 15px; 
            padding: 18px; text-align: left; cursor: pointer; font-size: 1.1rem; 
            font-weight: 600; transition: all 0.2s; color: #1C1C1E; 
            width: 100%; box-sizing: border-box; display: block;
        }
        /* 選取中的樣式 */
        .opt-btn.selected { border-color: var(--primary); background: #F0F7FF; box-shadow: 0 0 0 1px var(--primary); }
        .opt-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .opt-btn.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }
        
        .action-btn { width: 100%; padding: 20px; border-radius: 18px; border: none; background: #AEAEB2; color: white; font-size: 1.1rem; font-weight: bold; margin-top: 25px; cursor: pointer; transition: 0.3s; }
        .action-btn.ready { background: var(--primary); box-shadow: 0 6px 16px rgba(0,122,255,0.3); }

        .feedback-box { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; font-weight: bold; text-align: center; font-size: 15px; border: 1px solid transparent; }
        .fb-wrong { background: #FFEBEE; color: var(--danger); border-color: #FFCDD2; }
        .fb-correct { background: #E8F5E9; color: var(--success); border-color: #C8E6C9; }
    </style>
</head>
<body>

<div class="container">
    <div id="sheetMenu" class="menu-bar"></div>
    <div class="top-row">
        <div class="controls">
            <label class="switch"><input type="checkbox" id="qRandom" checked onchange="initQuiz()"><span class="slider"></span> 題目隨機</label>
            <label class="switch"><input type="checkbox" id="optRandom" checked onchange="render()"><span class="slider"></span> 選項隨機</label>
        </div>
        <button class="clear-btn" onclick="clearErrors()">清除記錄</button>
    </div>
    <div class="info-row">
        <div id="progress">載入中...</div>
        <div id="timer">總計時: 00:00</div>
    </div>
    <div class="card">
        <div class="badge-row">
            <span id="subject" class="badge">科目</span>
            <span id="qTypeBadge" class="badge badge-type">題型</span>
        </div>
        <div id="qText" class="q-text">正在讀取試題...</div>
        <div id="ansFeedback" class="feedback-box"></div>
    </div>
    <div id="options" class="options-grid"></div>
    <button id="mainBtn" class="action-btn" onclick="handleAction()" disabled>請先選擇答案</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwqJXMzDORmYWyyZQqgx5fKCTzpBc8vkfwbJpfPZpa-EgHPU0MY5Zh5CSsZbyfPcuEXKQ/exec";
    let rawData = [], quizData = [], index = 0, selectedIds = [];
    let totalSec = 0, currentSheet = new URLSearchParams(window.location.search).get('sheet');

    window.onload = async () => {
        try {
            const listResp = await fetch(`${API_URL}?type=listSheets`);
            const sheetNames = await listResp.json();
            const menu = document.getElementById('sheetMenu');
            if (!currentSheet) currentSheet = sheetNames[0];
            
            sheetNames.forEach(name => {
                const btn = document.createElement('button');
                btn.className = `menu-item ${name === currentSheet ? 'active' : ''}`;
                btn.innerText = name;
                btn.onclick = () => { location.href = `?sheet=${encodeURIComponent(name)}`; };
                menu.appendChild(btn);
            });

            const resp = await fetch(`${API_URL}?sheet=${currentSheet}`);
            rawData = await resp.json();
            
            setInterval(() => {
                totalSec++;
                document.getElementById('timer').innerText = `總計時: ${Math.floor(totalSec/60).toString().padStart(2,'0')}:${(totalSec%60).toString().padStart(2,'0')}`;
            }, 1000);
            
            initQuiz();
        } catch (e) { document.getElementById('qText').innerText = "❌ 讀取失敗，請確認 GAS 設定。"; }
    };

    function initQuiz() {
        quizData = document.getElementById('qRandom').checked ? [...rawData].sort(() => Math.random() - 0.5) : [...rawData];
        index = 0; render();
    }

    function render() {
        if (index >= quizData.length) { 
            document.getElementById('qText').innerText = "🎉 測驗完成！"; document.getElementById('options').innerHTML = ""; 
            const mainBtn = document.getElementById('mainBtn'); mainBtn.innerText = "重新測驗"; mainBtn.disabled = false; mainBtn.classList.add('ready');
            mainBtn.onclick = () => location.reload(); return; 
        }

        const q = quizData[index];
        selectedIds = []; // 重設選取狀態
        
        // 題型判斷邏輯 
        const cleanAns = q.ans.toString().toUpperCase().trim();
        let typeText = "選擇題";
        if (cleanAns === "O" || cleanAns === "X") typeText = "是非題";
        else if (cleanAns.includes(",")) typeText = "多選題";

        document.getElementById('progress').innerText = `第 ${index+1} / ${quizData.length} 題`;
        document.getElementById('subject').innerText = q.subject || "通用";
        document.getElementById('qTypeBadge').innerText = typeText;
        document.getElementById('qText').innerText = q.q;
        document.getElementById('ansFeedback').style.display = "none";
        
        const container = document.getElementById('options');
        container.innerHTML = "";

        let optsData = (q.opts && q.opts.length > 0) ? q.opts : ["O", "X"];
        let opts = optsData.map((text, i) => ({ 
            text: text, 
            id: (typeText === "是非題") ? text.toUpperCase().trim() : (i + 1).toString() 
        }));

        if (document.getElementById('optRandom').checked) opts.sort(() => Math.random() - 0.5);

        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt.text;
            btn.dataset.id = opt.id;
            // 點擊事件
            btn.onclick = () => {
                if (typeText === "多選題") {
                    btn.classList.toggle('selected');
                    updateMultiSelectStatus();
                } else {
                    handleSingleSelect(btn, opt.id, cleanAns);
                }
            };
            container.appendChild(btn);
        });

        const mainBtn = document.getElementById('mainBtn');
        mainBtn.innerText = (typeText === "多選題") ? "確認送出答案" : "下一題";
        mainBtn.disabled = true;
        mainBtn.classList.remove('ready');
    }

    // 更新多選題按鈕狀態
    function updateMultiSelectStatus() {
        selectedIds = Array.from(document.querySelectorAll('.opt-btn.selected')).map(b => b.dataset.id);
        const mainBtn = document.getElementById('mainBtn');
        mainBtn.disabled = (selectedIds.length === 0);
        mainBtn.classList.toggle('ready', selectedIds.length > 0);
    }

    // 單選與是非題處理
    async function handleSingleSelect(btn, id, ans) {
        document.querySelectorAll('.opt-btn').forEach(b => b.onclick = null); // 鎖定
        const isCorrect = id === ans;
        
        btn.classList.add(isCorrect ? 'correct' : 'wrong');
        if (!isCorrect) {
            document.querySelectorAll('.opt-btn').forEach(b => { if(b.dataset.id === ans) b.classList.add('correct'); });
            showFeedback(false, ans);
            await fetch(`${API_URL}?type=recordError&data=${encodeURIComponent(JSON.stringify(quizData[index]))}`);
        } else {
            showFeedback(true);
        }
        
        const mainBtn = document.getElementById('mainBtn');
        mainBtn.disabled = false;
        mainBtn.classList.add('ready');
    }

    // 處理底部按鈕動作
    async function handleAction() {
        const q = quizData[index];
        const cleanAns = q.ans.toString().toUpperCase().trim();
        const mainBtn = document.getElementById('mainBtn');

        if (mainBtn.innerText === "確認送出答案") {
            const correctArr = cleanAns.replace(/\s/g, '').split(",").sort();
            const userArr = selectedIds.sort();
            const isCorrect = JSON.stringify(correctArr) === JSON.stringify(userArr);

            document.querySelectorAll('.opt-btn').forEach(b => {
                b.onclick = null;
                if (correctArr.includes(b.dataset.id)) b.classList.add('correct');
                if (b.classList.contains('selected') && !correctArr.includes(b.dataset.id)) b.classList.add('wrong');
            });

            if (!isCorrect) {
                showFeedback(false, q.ans);
                await fetch(`${API_URL}?type=recordError&data=${encodeURIComponent(JSON.stringify(q))}`);
            } else {
                showFeedback(true);
            }
            mainBtn.innerText = "下一題";
        } else {
            index++;
            render();
        }
    }

    function showFeedback(isCorrect, ansText) {
        const fb = document.getElementById('ansFeedback');
        fb.style.display = "block";
        fb.className = `feedback-box ${isCorrect ? 'fb-correct' : 'fb-wrong'}`;
        fb.innerText = isCorrect ? "✨ 回答正確！" : `❌ 答錯了，正確答案：${ansText}`;
    }

    async function clearErrors() {
        if (confirm("確定要清除所有錯題記錄嗎？")) {
            await fetch(`${API_URL}?type=clearErrors`);
            alert("已成功清除！");
        }
    }
</script>
</body>
</html>
