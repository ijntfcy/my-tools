<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jexams Pro - 官方完工版</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --success: #34C759; --danger: #FF3B30; --disabled: #AEAEB2; --shadow: 0 4px 12px rgba(0,0,0,0.1); }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 密碼欄位美化 */
        .card-box { background: white; padding: 35px 25px; border-radius: 24px; box-shadow: var(--shadow); width: 100%; box-sizing: border-box; text-align: center; }
        .pwd-field { 
            width: 100%; padding: 16px; border: 2px solid #E5E5EA; border-radius: 14px; font-size: 20px; 
            margin: 15px 0; box-sizing: border-box; text-align: center; transition: all 0.3s;
            background: #F9F9FB; outline: none; letter-spacing: 4px;
        }
        .pwd-field:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(0,122,255,0.1); }
        
        /* 選項與計時器美化 */
        .timer-row { width: 100%; display: flex; justify-content: space-between; margin-bottom: 12px; gap: 12px; }
        .timer-chip { flex: 1; background: white; padding: 12px; border-radius: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .opt-btn { 
            background: white; border: 2px solid #F2F2F7; border-radius: 16px; padding: 18px; 
            text-align: left; cursor: pointer; font-size: 1.1rem; font-weight: 600; transition: all 0.2s;
            display: flex; align-items: flex-start; margin-bottom: 10px; width: 100%;
        }
        .opt-prefix { color: var(--primary); margin-right: 12px; font-weight: 800; min-width: 25px; }
        .opt-btn.selected { border-color: var(--primary); background: #F0F7FF; }
        .opt-btn.correct { background: var(--success) !important; color: white !important; }
        .opt-btn.wrong { background: var(--danger) !important; color: white !important; }
        
        .action-btn { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--disabled); 
            color: white; font-size: 1.2rem; font-weight: bold; margin-top: 25px; cursor: pointer;
        }
        .action-btn.ready { background: var(--primary); box-shadow: 0 6px 20px rgba(0,122,255,0.3); }
        .feedback { margin-top: 15px; padding: 18px; border-radius: 16px; display: none; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<div id="setupPage" class="container">
    <div class="card-box">
        <h1 style="font-size: 24px; margin-bottom: 20px;">Jexams Pro</h1>
        <input type="password" id="pwdInput" class="pwd-field" placeholder="••••••">
        <div style="margin-bottom: 25px;">
            <label><input type="checkbox" id="randQ" checked> 題目隨機</label>
            <label style="margin-left: 20px;"><input type="checkbox" id="randO" checked> 選項隨機</label>
        </div>
        <button class="action-btn ready" onclick="checkAuth()">驗證並進入</button>
    </div>
</div>

<div id="mainApp" class="container" style="display:none;">
    <div class="timer-row">
        <div class="timer-chip">總用時：<span id="totalTime">0</span>s</div>
        <div class="timer-chip">單題用時：<span id="singleTime">0</span>s</div>
    </div>
    <div class="card-box" style="text-align: left; margin-bottom: 20px;">
        <span id="subject" class="badge">科目</span>
        <div id="qText" style="font-size: 1.25rem; font-weight: bold; margin-top: 10px;">載入中...</div>
        <div id="ansFeedback" class="feedback"></div>
    </div>
    <div id="options"></div>
    <button id="mainBtn" class="action-btn" onclick="handleAction()" disabled>請先選擇答案</button>
</div>

<script>

    let quizData = [], index = 0, totalSec = 0, singleSec = 0, totalTimer, singleTimer, isProcessing = false;
    let selectedIds = [], currentAns = "", isMulti = false, userKey = sessionStorage.getItem('quiz_auth');

    // ... (後續腳本邏輯與前次提供一致，包含選取前綴、多選判定及計時器功能)

</body>
</html>
