<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jexams Pro</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --success: #34C759; --danger: #FF3B30; --disabled: #AEAEB2; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 密碼欄位美化 - 參考 image_3172fd.png */
        .login-card { background: white; padding: 40px 25px; border-radius: 28px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; margin-top: 50px; }
        .pwd-field { 
            width: 85%; padding: 15px; border: 2px solid #E5E5EA; border-radius: 18px; font-size: 24px; 
            text-align: center; letter-spacing: 5px; outline: none; transition: 0.3s; background: #F9F9FB;
        }
        .pwd-field:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(0,122,255,0.2); background: white; }
        
        /* 計時器樣式 - 參考 image_316f45.png */
        .timer-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .timer-box { flex: 1; background: white; padding: 12px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .timer-label { font-size: 10px; color: #AEAEB2; text-transform: uppercase; font-weight: bold; }
        .timer-val { font-size: 18px; font-weight: 800; color: #1C1C1E; }

        .quiz-card { background: white; border-radius: 28px; padding: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        .badge-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .badge { background: #E8F0FE; color: var(--primary); font-size: 12px; padding: 4px 12px; border-radius: 8px; font-weight: bold; }
        
        /* 選項按鈕 - 參考 image_315bde.png 自動序號 */
        .opt-btn { 
            background: white; border: 2px solid #F2F2F7; border-radius: 20px; padding: 18px; margin-bottom: 12px;
            text-align: left; cursor: pointer; font-size: 1.1rem; font-weight: 600; display: flex; width: 100%; transition: 0.2s;
        }
        .opt-num { color: var(--primary); margin-right: 12px; font-weight: 800; }
        .opt-btn.selected { border-color: var(--primary); background: #F0F7FF; }
        .opt-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .opt-btn.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }

        .main-btn { 
            width: 100%; padding: 20px; border-radius: 22px; border: none; background: var(--primary); 
            color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .main-btn:disabled { background: var(--disabled); cursor: not-allowed; }
    </style>
</head>
<body>

<div id="loginPage" class="container">
    <div class="login-card">
        <h1 style="margin:0 0 10px 0;">Jexams Pro</h1>
        <p style="color:#8E8E93; margin-bottom:30px;">請輸入 6 位數密碼進入測驗</p>
        <input type="password" id="userPwd" class="pwd-field" placeholder="••••••" maxlength="6">
        <div style="margin: 25px 0;">
            <label><input type="checkbox" id="randQ" checked> 題目隨機</label>
        </div>
        <button id="loginBtn" class="main-btn" onclick="checkAuth()">驗證並進入</button>
    </div>
</div>

<div id="quizPage" class="container" style="display:none;">
    <div id="sheetMenu" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:15px; padding:5px 0;"></div>
    
    <div class="timer-row">
        <div class="timer-box"><div class="timer-label">Total Time</div><div id="totalT" class="timer-val">0s</div></div>
        <div class="timer-box"><div class="timer-label">Single Q</div><div id="singleT" class="timer-val">0s</div></div>
    </div>

    <div class="quiz-card">
        <div class="badge-row">
            <div><span id="subj" class="badge">載入中</span> <span class="badge" style="background:#F2F2F7; color:#8E8E93">單選題</span></div>
            <div id="prog" style="font-size:12px; color:#AEAEB2; font-weight:bold;">0 / 0</div>
        </div>
        <div id="qText" style="font-size:1.3rem; font-weight:700; line-height:1.5;">載入中...</div>
        <div id="fb" style="display:none; margin-top:15px; padding:15px; border-radius:15px; text-align:center; font-weight:bold;"></div>
    </div>

    <div id="options"></div>
    <button id="nextBtn" class="main-btn" onclick="handleAction()" disabled>請先選擇答案</button>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwqJXMzDORmYWyyZQqgx5fKCTzpBc8vkfwbJpfPZpa-EgHPU0MY5Zh5CSsZbyfPcuEXKQ/exec";
    let quizData = [], index = 0, selected = [], isDone = false, pass = "", totalS = 0, singleS = 0, timers = {};

    async function checkAuth() {
        pass = document.getElementById('userPwd').value;
        const btn = document.getElementById('loginBtn');
        btn.innerText = "驗證中...";
        try {
            const r = await fetch(`${API}?pwd=${encodeURIComponent(pass)}&type=listSheets`);
            const d = await r.json();
            if (d.error) { alert("密碼錯誤！"); btn.innerText = "驗證並進入"; }
            else { start(d); }
        } catch (e) { alert("連線失敗，請檢查 GAS 部署狀態"); btn.innerText = "驗證並進入"; }
    }

    function start(sheets) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('quizPage').style.display = 'block';
        const curS = new URLSearchParams(window.location.search).get('sheet') || sheets[0];
        
        const menu = document.getElementById('sheetMenu');
        sheets.forEach(s => {
            const b = document.createElement('button');
            b.innerText = s;
            b.style = `padding:10px 20px; border:none; border-radius:12px; cursor:pointer; font-weight:bold; white-space:nowrap; ${s === curS ? 'background:var(--primary);color:white' : 'background:white;color:#8E8E93'}`;
            b.onclick = () => location.search = `?sheet=${encodeURIComponent(s)}`;
            menu.appendChild(b);
        });

        fetchData(curS);
        timers.total = setInterval(() => { totalS++; document.getElementById('totalT').innerText = totalS + 's'; }, 1000);
    }

    async function fetchData(sName) {
        const r = await fetch(`${API}?pwd=${encodeURIComponent(pass)}&sheet=${encodeURIComponent(sName)}`);
        const d = await r.json();
        quizData = document.getElementById('randQ').checked ? d.sort(() => Math.random() - 0.5) : d;
        render();
    }

    function render() {
        if (index >= quizData.length) {
            clearInterval(timers.total); clearInterval(timers.single);
            document.getElementById('qText').innerText = "🎉 測驗完成！";
            document.getElementById('options').innerHTML = "";
            document.getElementById('nextBtn').style.display = "none";
            return;
        }
        isDone = false; selected = []; singleS = 0;
        const q = quizData[index];
        document.getElementById('subj').innerText = q.subject;
        document.getElementById('prog').innerText = `${index + 1} / ${quizData.length}`;
        document.getElementById('qText').innerText = q.q;
        document.getElementById('fb').style.display = 'none';

        const box = document.getElementById('options');
        box.innerHTML = "";
        q.opts.forEach((t, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerHTML = `<span class="opt-num">${i+1}.</span> <span>${t}</span>`;
            b.onclick = () => { if(isDone) return; selected = [(i+1).toString()]; check(); };
            box.appendChild(b);
        });

        clearInterval(timers.single);
        timers.single = setInterval(() => { singleS++; document.getElementById('singleT').innerText = singleS + 's'; }, 1000);
        document.getElementById('nextBtn').disabled = true;
        document.getElementById('nextBtn').innerText = "請點擊答案";
    }

    function check() {
        isDone = true; clearInterval(timers.single);
        const q = quizData[index];
        const isRight = q.ans === selected[0];

        document.querySelectorAll('.opt-btn').forEach((b, i) => {
            const id = (i+1).toString();
            if(id === q.ans) b.classList.add('correct');
            else if(id === selected[0]) b.classList.add('wrong');
        });

        const f = document.getElementById('fb');
        f.style.display = 'block';
        f.style.background = isRight ? '#E8F5E9' : '#FFEBEE';
        f.style.color = isRight ? 'var(--success)' : 'var(--danger)';
        f.innerText = isRight ? `✨ 正確！(用時：${singleS}s)` : `❌ 錯誤，正確答案是：${q.ans}`;
        
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('nextBtn').innerText = "下一題";
    }

    function handleAction() { index++; render(); }
</script>
</body>
</html>
