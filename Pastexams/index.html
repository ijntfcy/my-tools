<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jexams Pro - 安全加強版</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --success: #34C759; --danger: #FF3B30; --disabled: #AEAEB2; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 密碼欄位美化 */
        .login-card { background: white; padding: 40px 25px; border-radius: 28px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); text-align: center; margin-top: 50px; }
        .pwd-input { 
            width: 80%; padding: 15px; border: 2px solid #E5E5EA; border-radius: 15px; font-size: 24px; 
            text-align: center; letter-spacing: 5px; transition: 0.3s; outline: none; background: #F9F9FB;
        }
        .pwd-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 15px rgba(0,122,255,0.2); }
        
        .quiz-card { background: white; border-radius: 24px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); margin-bottom: 20px; }
        .badge { background: #E8F0FE; color: var(--primary); font-size: 12px; padding: 4px 10px; border-radius: 8px; font-weight: bold; }
        .q-text { font-size: 1.25rem; font-weight: bold; line-height: 1.5; color: #1C1C1E; margin-top: 15px; }

        .opt-btn { 
            background: white; border: 2px solid #F2F2F7; border-radius: 16px; padding: 16px; margin-bottom: 12px;
            text-align: left; cursor: pointer; font-size: 1.05rem; font-weight: 600; display: flex; align-items: flex-start; transition: 0.2s; width: 100%;
        }
        .opt-num { color: var(--primary); margin-right: 12px; font-weight: 800; min-width: 25px; }
        .opt-btn.selected { border-color: var(--primary); background: #F0F7FF; }
        .opt-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .opt-btn.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }

        .main-btn { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--disabled); 
            color: white; font-size: 1.1rem; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s;
        }
        .main-btn.active { background: var(--primary); }
    </style>
</head>
<body>

<div id="loginPage" class="container">
    <div class="login-card">
        <h2>測驗登入</h2>
        <input type="password" id="pwdField" class="pwd-input" placeholder="••••••" maxlength="10">
        <div style="margin: 20px 0;">
            <label><input type="checkbox" id="randQ" checked> 題目隨機</label>
        </div>
        <button id="loginBtn" class="main-btn active" onclick="doLogin()">驗證密碼並進入</button>
    </div>
</div>

<div id="quizPage" class="container" style="display:none;">
    <div id="menu" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:15px; padding-bottom:5px;"></div>
    <div class="quiz-card">
        <div style="display:flex; justify-content:space-between;"><span id="subject" class="badge">科目</span><span id="progress" style="font-size:12px; color:#888;"></span></div>
        <div id="qText" class="q-text">讀取中...</div>
        <div id="res" style="margin-top:15px; display:none; font-weight:bold; text-align:center;"></div>
    </div>
    <div id="options"></div>
    <button id="actionBtn" class="main-btn" onclick="handleNext()" disabled>請先選擇答案</button>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwqJXMzDORmYWyyZQqgx5fKCTzpBc8vkfwbJpfPZpa-EgHPU0MY5Zh5CSsZbyfPcuEXKQ/exec";
    let quizData = [], index = 0, selected = [], isMulti = false, isDone = false, currentPass = "";

    async function doLogin() {
        currentPass = document.getElementById('pwdField').value;
        const btn = document.getElementById('loginBtn');
        btn.innerText = "驗證中...";
        
        try {
            const resp = await fetch(`${GAS_URL}?pwd=${encodeURIComponent(currentPass)}&type=listSheets`);
            const data = await resp.json();
            
            if (data.error) {
                alert("密碼不正確！");
                btn.innerText = "驗證密碼並進入";
            } else {
                startQuiz(data);
            }
        } catch (e) {
            alert("伺服器連線失敗，請檢查 GAS 部署");
            btn.innerText = "驗證密碼並進入";
        }
    }

    function startQuiz(sheets) {
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('quizPage').style.display = 'block';
        const curSheet = new URLSearchParams(window.location.search).get('sheet') || sheets[0];

        // 選單
        const menu = document.getElementById('menu');
        sheets.forEach(s => {
            const b = document.createElement('button');
            b.innerText = s;
            b.style = `padding:8px 15px; border:none; border-radius:10px; cursor:pointer; white-space:nowrap; ${s === curSheet ? 'background:var(--primary);color:white' : 'background:white'}`;
            b.onclick = () => location.search = `?sheet=${encodeURIComponent(s)}`;
            menu.appendChild(b);
        });

        loadData(curSheet);
    }

    async function loadData(sheetName) {
        const resp = await fetch(`${GAS_URL}?pwd=${encodeURIComponent(currentPass)}&sheet=${encodeURIComponent(sheetName)}`);
        const data = await resp.json();
        quizData = document.getElementById('randQ').checked ? data.sort(() => Math.random() - 0.5) : data;
        render();
    }

    function render() {
        if (index >= quizData.length) {
            document.getElementById('qText').innerText = "測驗結束！";
            document.getElementById('options').innerHTML = "";
            document.getElementById('actionBtn').style.display = "none";
            return;
        }
        isDone = false; selected = [];
        const q = quizData[index];
        isMulti = q.ans.toString().includes(',');

        document.getElementById('subject').innerText = q.subject;
        document.getElementById('qText').innerText = q.q;
        document.getElementById('progress').innerText = `${index + 1}/${quizData.length}`;
        document.getElementById('res').style.display = 'none';

        const box = document.getElementById('options');
        box.innerHTML = "";
        q.opts.forEach((t, i) => {
            const b = document.createElement('button');
            b.className = 'opt-btn';
            b.innerHTML = `<span class="opt-num">(${i+1})</span><span>${t}</span>`;
            b.onclick = () => {
                if(isDone) return;
                if(isMulti) {
                    b.classList.toggle('selected');
                    const val = (i+1).toString();
                    selected.includes(val) ? selected = selected.filter(x=>x!==val) : selected.push(val);
                    btnState("送出答案", selected.length > 0);
                } else {
                    selected = [(i+1).toString()];
                    check();
                }
            };
            box.appendChild(b);
        });
        btnState("請選擇答案", false);
    }

    function check() {
        isDone = true;
        const q = quizData[index];
        const correct = q.ans.toString().split(',').sort();
        const user = selected.sort();
        const isRight = JSON.stringify(correct) === JSON.stringify(user);

        document.querySelectorAll('.opt-btn').forEach((b, i) => {
            const id = (i+1).toString();
            if(correct.includes(id)) b.classList.add('correct');
            else if(user.includes(id)) b.classList.add('wrong');
        });

        const res = document.getElementById('res');
        res.style.display = 'block';
        res.style.color = isRight ? 'var(--success)' : 'var(--danger)';
        res.innerText = isRight ? "正確！" : `錯誤！正確答案：${q.ans}`;
        btnState("下一題", true);
    }

    function handleNext() {
        const b = document.getElementById('actionBtn');
        if(b.innerText === "送出答案") check();
        else { index++; render(); }
    }

    function btnState(txt, active) {
        const b = document.getElementById('actionBtn');
        b.innerText = txt; b.disabled = !active; b.classList.toggle('active', active);
    }
</script>
</body>
</html>
