<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jexams 測驗系統</title>
    <style>
        :root { --primary: #007bff; --success-bg: #4caf50; --error-bg: #ffebee; --error-text: #d32f2f; }
        body { font-family: "Microsoft JhengHei", sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 600px; }
        .hidden { display: none !important; }

        /* 登入樣式 */
        .login-card { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input[type="password"] { width: 80%; padding: 12px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 1.1rem; }

        /* 頂部導航 */
        .nav-bar { display: flex; background: #e0e0e0; border-radius: 12px; margin-bottom: 20px; padding: 4px; }
        .nav-btn { flex: 1; padding: 12px; text-align: center; cursor: pointer; font-weight: bold; color: #555; }
        .nav-btn.active { background: white; border-radius: 10px; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* 計時器區塊 */
        .timer-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .timer-box { flex: 1; background: white; padding: 15px; border-radius: 18px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .timer-label { font-size: 12px; color: #888; margin-bottom: 5px; }
        .timer-val { font-size: 22px; font-weight: bold; color: var(--primary); }

        /* 題目卡片 */
        .quiz-card { background: white; border-radius: 25px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; }
        .page-info { position: absolute; right: 30px; top: 30px; color: #bbb; }
        .badge { display: inline-block; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; margin-right: 8px; margin-bottom: 10px; }
        .badge-cat { background: #e3f2fd; color: #2196f3; }
        .badge-type { background: #f5f5f5; color: #757575; }
        h2 { font-size: 22px; margin-top: 10px; }

        /* 選項與回饋 */
        .option { width: 100%; text-align: left; padding: 18px; margin-bottom: 12px; border: none; border-radius: 15px; 
                  background: var(--success-bg); color: white; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .option.selected { outline: 3px solid var(--primary); }
        .feedback { background: var(--error-bg); color: var(--error-text); padding: 20px; border-radius: 15px; text-align: center; 
                    margin-bottom: 20px; font-weight: bold; line-height: 1.6; }
        
        button.action-btn { background: var(--primary); color: white; border: none; padding: 10px 25px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section" class="login-card">
        <h2>Jexams 系統登入</h2>
        <input type="password" id="pwd-input" placeholder="輸入密碼">
        <br>
        <button class="action-btn" onclick="handleLogin()">進入系統</button>
    </div>

    <div id="quiz-section" class="hidden">
        <div id="nav-container" class="nav-bar"></div>

        <div class="timer-row">
            <div class="timer-box">
                <div class="timer-label">總計時</div>
                <div class="timer-val" id="total-time">0s</div>
            </div>
            <div class="timer-box">
                <div class="timer-label">單題計時</div>
                <div class="timer-val" id="step-time">0s</div>
            </div>
        </div>

        <div class="quiz-card">
            <div class="page-info" id="progress">1 / 13</div>
            <div class="badge badge-cat" id="subject-name">生活常識</div>
            <div class="badge badge-type" id="type-text">多選題</div>
            <h2 id="q-text">載入中...</h2>

            <div id="feedback-box" class="feedback hidden">
                ❌ 錯誤！正確答案：<span id="correct-ans"></span><br>
                (耗時：<span id="spent-time"></span>秒)
            </div>

            <div id="options-container"></div>

            <div style="margin-top: 20px; text-align: right;">
                <button id="submit-btn" class="action-btn hidden" onclick="checkMultiple()">送出答案</button>
                <button id="next-btn" class="action-btn hidden" onclick="nextQuestion()">下一題</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "您的_GAS_網址"; 
    let currentPwd = "", quizData = [], currentIndex = 0;
    let totalSec = 0, stepSec = 0;

    async function handleLogin() {
        const pwd = document.getElementById('pwd-input').value;
        const resp = await fetch(`${API_URL}?pwd=${pwd}&type=listSheets`);
        const result = await resp.json();
        if (result.status === "success") {
            currentPwd = pwd;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('quiz-section').classList.remove('hidden');
            renderNav(result.data);
            setInterval(() => { totalSec++; stepSec++; 
                document.getElementById('total-time').innerText = totalSec + 's';
                document.getElementById('step-time').innerText = stepSec + 's';
            }, 1000);
        } else { alert("密碼錯誤"); }
    }

    function renderNav(sheets) {
        const container = document.getElementById('nav-container');
        sheets.forEach((name, i) => {
            const btn = document.createElement('div');
            btn.className = `nav-btn ${i===0?'active':''}`;
            btn.innerText = name;
            btn.onclick = (e) => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                loadQuiz(name);
            };
            container.appendChild(btn);
        });
        loadQuiz(sheets[0]);
    }

    async function loadQuiz(sheetName) {
        const resp = await fetch(`${API_URL}?pwd=${currentPwd}&type=getQuiz&sheet=${sheetName}`);
        const result = await resp.json();
        quizData = result.data;
        currentIndex = 0;
        showQuestion();
    }

    function showQuestion() {
        stepSec = 0;
        const q = quizData[currentIndex];
        document.getElementById('q-text').innerText = q.question;
        document.getElementById('subject-name').innerText = q.subject;
        document.getElementById('type-text').innerText = q.isMultiple ? "多選題" : "單選題";
        document.getElementById('progress').innerText = `${currentIndex + 1} / ${quizData.length}`;
        document.getElementById('feedback-box').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        
        q.options.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'option';
            btn.innerText = opt;
            btn.onclick = () => q.isMultiple ? btn.classList.toggle('selected') : judge((i+1).toString());
            container.appendChild(btn);
        });
        document.getElementById('submit-btn').classList.toggle('hidden', !q.isMultiple);
    }

    function checkMultiple() {
        const selected = Array.from(document.querySelectorAll('.option.selected')).map(btn => 
            (quizData[currentIndex].options.indexOf(btn.innerText) + 1).toString()
        ).sort().join(',');
        judge(selected);
    }

    function judge(userAns) {
        const q = quizData[currentIndex];
        const isCorrect = userAns === q.answer.split(',').sort().join(',');
        
        if (!isCorrect) {
            document.getElementById('feedback-box').classList.remove('hidden');
            document.getElementById('correct-ans').innerText = q.answer;
            document.getElementById('spent-time').innerText = stepSec;
        }
        document.getElementById('submit-btn').classList.add('hidden');
        document.getElementById('next-btn').classList.remove('hidden');
        // 鎖定按鈕
        document.querySelectorAll('.option').forEach(b => b.onclick = null);
    }

    function nextQuestion() {
        if (currentIndex < quizData.length - 1) { currentIndex++; showQuestion(); }
        else { alert("測驗完成！"); }
    }
</script>
</body>
</html>
