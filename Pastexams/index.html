<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jexams 雲端測驗系統</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        :root { --primary: #007AFF; --success: #34C759; --danger: #FF3B30; --bg: #F2F2F7; --text: #1C1C1E; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; color: var(--text); }
        .container { width: 100%; max-width: 600px; }
        
        /* 選單樣式：自動從 Excel 分頁名稱生成 */
        .menu-bar { display: flex; background: #E5E5EA; padding: 4px; border-radius: 12px; margin-bottom: 12px; flex-wrap: wrap; gap: 4px; }
        .menu-item { flex: 1; min-width: 80px; border: none; background: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; }
        .menu-item.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* 控制選項靠左 */
        .control-panel { display: flex; justify-content: flex-start; gap: 15px; margin-bottom: 12px; padding: 0 5px; width: 100%; box-sizing: border-box; }
        .switch-label { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; color: #48484A; cursor: pointer; }
        
        /* 計時器列 */
        .timer-row { display: flex; justify-content: space-between; margin-bottom: 10px; width: 100%; padding: 0 5px; box-sizing: border-box; }
        .timer-pill { background: #E5E5EA; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; color: #3A3A3C; }

        /* 題目卡片設計 */
        .card { background: white; border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 15px; position: relative; width: 100%; box-sizing: border-box; }
        .badge-row { display: flex; gap: 8px; margin-bottom: 15px; }
        .badge { font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: 700; }
        .badge-subject { background: #E8F0FE; color: var(--primary); }
        .badge-type { background: #F2F2F7; color: #8E8E93; }
        .q-text { font-size: 1.3rem; font-weight: 700; line-height: 1.4; margin-bottom: 5px; }

        /* 答案回饋：單題耗時放在錯誤提示前 */
        .ans-feedback { margin-top: 15px; padding: 15px; border-radius: 12px; font-weight: 700; display: none; font-size: 14px; }
        .fb-correct { background: #E8F5E9; color: var(--success); border: 1px solid #C8E6C9; }
        .fb-wrong { background: #FFEBEE; color: var(--danger); border: 1px solid #FFCDD2; }

        /* 選項按鈕樣式 */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; }
        .opt-btn { background: white; border: 2px solid #F2F2F7; border-radius: 16px; padding: 18px; text-align: left; cursor: pointer; font-size: 1rem; transition: 0.2s; font-weight: 500; width: 100%; box-sizing: border-box; }
        .opt-btn.selected { border-color: var(--primary); background: #F0F7FF; }
        .opt-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success); }
        .opt-btn.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger); }
        
        .action-btn { width: 100%; padding: 20px; border-radius: 18px; border: none; background: #D1D1D6; color: white; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        .action-btn.ready { background: var(--primary); box-shadow: 0 6px 16px rgba(0,122,255,0.3); }
    </style>
</head>
<body>

<div class="container">
    <div id="sheetMenu" class="menu-bar"></div>

    <div class="control-panel">
        <label class="switch-label"><input type="checkbox" id="qRandom" onchange="initQuiz()"> 題目隨機</label>
        <label class="switch-label"><input type="checkbox" id="optRandom" onchange="render()"> 選項隨機</label>
    </div>

    <div class="timer-row">
        <div class="timer-pill">單題計時: <span id="qTimer">0s</span></div>
        <div class="timer-pill">總計時: <span id="totalTimer">00:00</span></div>
    </div>

    <div class="card">
        <div class="badge-row">
            <span id="subject" class="badge badge-subject">科目</span>
            <span id="qType" class="badge badge-type">類型</span>
        </div>
        <div id="qText" class="q-text">讀取中...</div>
        <div id="ansFeedback" class="ans-feedback"></div>
    </div>

    <div id="options" class="options-grid"></div>
    <button id="mainBtn" class="action-btn" onclick="handleAction()" disabled>下一題</button>
</div>

<script>
    // 您的 GAS API 網址
    const API_URL = "https://script.google.com/macros/s/AKfycbwqJXMzDORmYWyyZQqgx5fKCTzpBc8vkfwbJpfPZpa-EgHPU0MY5Zh5CSsZbyfPcuEXKQ/exec";
    let rawData = [], quizData = [], index = 0, selectedIds = [];
    let totalSeconds = 0, qSeconds = 0, totalInterval, qInterval;

    let currentSheet = new URLSearchParams(window.location.search).get('sheet');

    window.onload = async () => {
        try {
            // 1. 自動從試算表抓取所有分頁名稱
            const listResp = await fetch(`${API_URL}?type=listSheets`);
            const sheetNames = await listResp.json();
            
            const menuContainer = document.getElementById('sheetMenu');
            if (!currentSheet) currentSheet = sheetNames[0];

            sheetNames.forEach(name => {
                const btn = document.createElement('button');
                btn.className = `menu-item ${name === currentSheet ? 'active' : ''}`;
                btn.innerText = name;
                btn.onclick = () => window.location.search = `?sheet=${encodeURIComponent(name)}`;
                menuContainer.appendChild(btn);
            });

            // 2. 獲取當前分頁的題目
            const resp = await fetch(`${API_URL}?sheet=${currentSheet}`);
            rawData = await resp.json();
            
            startTotalTimer();
            initQuiz();
        } catch (e) { document.getElementById('qText').innerText = "連線失敗，請檢查 GAS 部署權限。"; }
    };

    function startTotalTimer() {
        totalInterval = setInterval(() => {
            totalSeconds++;
            let m = Math.floor(totalSeconds / 60).toString().padStart(2, '0');
            let s = (totalSeconds % 60).toString().padStart(2, '0');
            document.getElementById('totalTimer').innerText = `${m}:${s}`;
        }, 1000);
    }

    function startQuestionTimer() {
        qSeconds = 0;
        document.getElementById('qTimer').innerText = "0s";
        clearInterval(qInterval);
        qInterval = setInterval(() => {
            qSeconds++;
            document.getElementById('qTimer').innerText = `${qSeconds}s`;
        }, 1000);
    }

    function initQuiz() {
        quizData = document.getElementById('qRandom').checked ? [...rawData].sort(() => Math.random() - 0.5) : [...rawData];
        index = 0; render();
    }

    function render() {
        if (index >= quizData.length) { 
            clearInterval(totalInterval); clearInterval(qInterval);
            document.getElementById('qText').innerText = "測驗完成！"; 
            document.getElementById('options').innerHTML = ""; return; 
        }
        
        startQuestionTimer();
        const q = quizData[index];
        const ansStr = q.ans.toUpperCase();
        selectedIds = [];
        
        let typeText = "選擇題";
        if (ansStr === "O" || ansStr === "X") typeText = "是非題";
        else if (ansStr.includes(",")) typeText = "多選題";
        
        document.getElementById('subject').innerText = q.subject;
        document.getElementById('qType').innerText = typeText;
        document.getElementById('qText').innerText = q.q;
        document.getElementById('ansFeedback').style.display = "none";

        const container = document.getElementById('options');
        container.innerHTML = "";

        let optsData = (q.opts && q.opts.length > 0) ? q.opts : ["O", "X"];
        let opts = optsData.map((t, i) => ({ 
            text: t, 
            id: (ansStr === "O" || ansStr === "X") ? t.toUpperCase() : (i + 1).toString() 
        }));

        if (document.getElementById('optRandom').checked) opts.sort(() => Math.random() - 0.5);

        opts.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn animate__animated fadeIn';
            // 加上 1. 2. 3. 序號 (是非題除外)
            const prefix = (typeText !== "是非題") ? `${idx + 1}. ` : "";
            btn.innerText = prefix + opt.text;
            btn.dataset.id = opt.id;
            btn.onclick = () => handleSelect(btn, opt.id, ansStr);
            container.appendChild(btn);
        });

        const mainBtn = document.getElementById('mainBtn');
        mainBtn.innerText = typeText === "多選題" ? "確認送出" : "下一題";
        mainBtn.disabled = true;
        mainBtn.classList.remove('ready');
    }

    function handleSelect(btn, id, ans) {
        const feedback = document.getElementById('ansFeedback');
        if (!ans.includes(",")) { // 單選或是非
            clearInterval(qInterval);
            document.querySelectorAll('.opt-btn').forEach(b => {
                b.onclick = null;
                if (b.dataset.id === ans) b.classList.add('correct');
            });

            feedback.style.display = "block";
            if (id === ans) {
                feedback.className = "ans-feedback fb-correct";
                feedback.innerText = `✨ 正確！(耗時 ${qSeconds}s)`;
            } else {
                btn.classList.add('wrong');
                feedback.className = "ans-feedback fb-wrong";
                // 修正：單題耗時放在錯誤提示前
                feedback.innerText = `(${qSeconds}s) ❌ 答錯了。答案是：${ans}`;
            }
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('mainBtn').classList.add('ready');
        } else { // 複選
            btn.classList.toggle('selected');
            selectedIds = Array.from(document.querySelectorAll('.opt-btn.selected')).map(b => b.dataset.id);
            document.getElementById('mainBtn').disabled = selectedIds.length === 0;
            document.getElementById('mainBtn').classList.toggle('ready', selectedIds.length > 0);
        }
    }

    function handleAction() {
        const mainBtn = document.getElementById('mainBtn');
        const q = quizData[index];
        const feedback = document.getElementById('ansFeedback');

        if (mainBtn.innerText === "確認送出") {
            clearInterval(qInterval);
            const correctArr = q.ans.toUpperCase().split(",").sort();
            const userArr = selectedIds.sort();
            const isCorrect = JSON.stringify(correctArr) === JSON.stringify(userArr);
            
            document.querySelectorAll('.opt-btn').forEach(b => {
                b.onclick = null;
                if (correctArr.includes(b.dataset.id)) b.classList.add('correct');
                if (b.classList.contains('selected') && !correctArr.includes(b.dataset.id)) b.classList.add('wrong');
            });

            feedback.style.display = "block";
            if (isCorrect) {
                feedback.className = "ans-feedback fb-correct";
                feedback.innerText = `✨ 複選正確！(耗時 ${qSeconds}s)`;
            } else {
                feedback.className = "ans-feedback fb-wrong";
                // 修正：單題耗時放在多選題錯誤提示前
                feedback.innerText = `(${qSeconds}s) ❌ 答錯了。答案：${q.ans}`;
            }
            mainBtn.innerText = "下一題";
        } else { index++; render(); }
    }
</script>
</body>
</html>
