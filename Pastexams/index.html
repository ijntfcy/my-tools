<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jexams 雲端測驗</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --success: #34C759; --danger: #FF3B30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        
        /* 計時器樣式 */
        .timer-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .timer-box { flex: 1; background: white; padding: 10px; border-radius: 12px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .timer-label { font-size: 11px; color: #8E8E93; font-weight: bold; margin-bottom: 2px; }
        .timer-value { font-family: 'Courier New', monospace; font-size: 18px; font-weight: bold; color: var(--primary); }

        .menu-bar { display: flex; background: #E5E5EA; padding: 4px; border-radius: 12px; margin-bottom: 15px; overflow-x: auto; gap: 4px; }
        .menu-item { flex: 1; border: none; background: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; white-space: nowrap; }
        .menu-item.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%; }
        .controls { display: flex; gap: 12px; }
        .switch { display: inline-flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 600; color: #48484A; }
        .switch input { display: none; }
        .slider { width: 40px; height: 22px; background-color: #D1D1D6; border-radius: 20px; position: relative; transition: .3s; margin-right: 6px; }
        .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(18px); }
        .clear-btn { background: var(--danger); color: white; border: none; padding: 8px 14px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 12px; }

        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; text-align: left; width: 100%; box-sizing: border-box; }
        .badge-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .badge { background: #E8F0FE; color: var(--primary); font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .badge-type { background: #F2F2F7; color: #666; }
        .q-text { font-size: 1.35rem; font-weight: bold; line-height: 1.5; color: #1C1C1E; }
        
        .options-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .opt-btn { 
            background: white; border: 2px solid #E5E5EA; border-radius: 15px; 
            padding: 18px; text-align: left; cursor: pointer; font-size: 1.1rem; 
            font-weight: 600; transition: all 0.2s; color: #1C1C1E; width: 100%; box-sizing: border-box;
            display: flex; align-items: flex-start;
        }
        /* 序號樣式 */
        .opt-idx { color: var(--primary); margin-right: 12px; min-width: 24px; }

        .opt-btn.selected { border-color: var(--primary); background: #F0F7FF; border-width: 3px; }
        .opt-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .opt-btn.correct .opt-idx { color: white; }
        .opt-btn.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }
        .opt-btn.wrong .opt-idx { color: white; }
        
        .action-btn { width: 100%; padding: 20px; border-radius: 18px; border: none; background: #AEAEB2; color: white; font-size: 1.1rem; font-weight: bold; margin-top: 25px; cursor: pointer; }
        .action-btn.ready { background: var(--primary); box-shadow: 0 6px 16px rgba(0,122,255,0.3); }

        .feedback-box { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; font-weight: bold; text-align: center; }
        .fb-wrong { background: #FFEBEE; color: var(--danger); border: 1px solid #FFCDD2; }
        .fb-correct { background: #E8F5E9; color: var(--success); border: 1px solid #C8E6C9; }
    </style>
</head>
<body>

<div class="container">
    <div id="sheetMenu" class="menu-bar"></div>

    <div class="timer-container">
        <div class="timer-box">
            <div class="timer-label">總計時</div>
            <div id="totalTimer" class="timer-value">00:00</div>
        </div>
        <div class="timer-box">
            <div class="timer-label">本題計時</div>
            <div id="qTimer" class="timer-value">00:00</div>
        </div>
    </div>

    <div class="top-row">
        <div class="controls">
            <label class="switch"><input type="checkbox" id="qRandom" checked onchange="initQuiz()"><span class="slider"></span> 題目隨機</label>
            <label class="switch"><input type="checkbox" id="optRandom" checked onchange="render()"><span class="slider"></span> 選項隨機</label>
        </div>
        <button class="clear-btn" onclick="clearErrors()">清除記錄</button>
    </div>
    <div id="info" style="font-size: 12px; color: #888; margin-bottom: 8px;">載入中...</div>
    <div class="card">
        <div class="badge-row">
            <span id="subject" class="badge">科目</span>
            <span id="qTypeBadge" class="badge badge-type">判斷中</span>
        </div>
        <div id="qText" class="q-text">讀取試題中...</div>
        <div id="ansFeedback" class="feedback-box"></div>
    </div>
    <div id="options" class="options-grid"></div>
    <button id="mainBtn" class="action-btn" onclick="handleAction()" disabled>請先選擇答案</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbwqJXMzDORmYWyyZQqgx5fKCTzpBc8vkfwbJpfPZpa-EgHPU0MY5Zh5CSsZbyfPcuEXKQ/exec"; 
    let rawData = [], quizData = [], index = 0, selectedIds = [];
    let currentSheet = new URLSearchParams(window.location.search).get('sheet');
    
    // 計時器變數
    let totalSec = 0, qSec = 0, totalTimerInterval, qTimerInterval;

    window.onload = async () => {
        const listResp = await fetch(`${API_URL}?type=listSheets`);
        const sheetNames = await listResp.json();
        const menu = document.getElementById('sheetMenu');
        if (!currentSheet) currentSheet = sheetNames[0];
        sheetNames.forEach(name => {
            const btn = document.createElement('button');
            btn.className = `menu-item ${name === currentSheet ? 'active' : ''}`;
            btn.innerText = name;
            btn.onclick = () => location.search = `?sheet=${encodeURIComponent(name)}`;
            menu.appendChild(btn);
        });
        const resp = await fetch(`${API_URL}?sheet=${currentSheet}`);
        rawData = await resp.json();
        initQuiz();
        startTotalTimer();
    };

    function startTotalTimer() {
        totalTimerInterval = setInterval(() => {
            totalSec++;
            document.getElementById('totalTimer').innerText = formatTime(totalSec);
        }, 1000);
    }

    function resetQTimer() {
        clearInterval(qTimerInterval);
        qSec = 0;
        document.getElementById('qTimer').innerText = "00:00";
        qTimerInterval = setInterval(() => {
            qSec++;
            document.getElementById('qTimer').innerText = formatTime(qSec);
        }, 1000);
    }

    function formatTime(seconds) {
        const m = Math.floor(seconds / 60).toString().padStart(2, '0');
        const s = (seconds % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function initQuiz() {
        quizData = document.getElementById('qRandom').checked ? [...rawData].sort(() => Math.random() - 0.5) : [...rawData];
        index = 0; render();
    }

    function render() {
        if (index >= quizData.length) { 
            clearInterval(totalTimerInterval);
            clearInterval(qTimerInterval);
            document.getElementById('qText').innerText = "測驗完成！"; document.getElementById('options').innerHTML = ""; 
            const mainBtn = document.getElementById('mainBtn'); mainBtn.innerText = "重新開始"; mainBtn.disabled = false; mainBtn.classList.add('ready');
            mainBtn.onclick = () => location.reload(); return; 
        }

        resetQTimer();
        const q = quizData[index];
        selectedIds = [];
        
        const cleanAns = q.ans.toString().replace(/，/g, ',').toUpperCase().trim();
        const isMulti = cleanAns.includes(",");
        const isTrueFalse = (cleanAns === "O" || cleanAns === "X");
        const typeText = isTrueFalse ? "是非題" : (isMulti ? "多選題" : "單選題");

        document.getElementById('info').innerText = `第 ${index+1} / ${quizData.length} 題`;
        document.getElementById('subject').innerText = q.subject;
        document.getElementById('qTypeBadge').innerText = typeText;
        document.getElementById('qText').innerText = q.q;
        document.getElementById('ansFeedback').style.display = "none";
        
        const container = document.getElementById('options');
        container.innerHTML = "";

        let opts = (isTrueFalse ? ["O", "X"] : q.opts).map((text, i) => ({
            text: text,
            id: isTrueFalse ? text.toUpperCase() : (i + 1).toString()
        }));

        if (document.getElementById('optRandom').checked && !isTrueFalse) opts.sort(() => Math.random() - 0.5);

        opts.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            // 新增序號顯示 1. 2. 3.
            btn.innerHTML = `<span class="opt-idx">${i + 1}.</span><span>${opt.text}</span>`;
            btn.onclick = () => {
                if (typeText === "多選題") {
                    btn.classList.toggle('selected');
                    selectedIds = Array.from(document.querySelectorAll('.opt-btn.selected')).map(b => b.dataset.id);
                    document.getElementById('mainBtn').disabled = selectedIds.length === 0;
                    document.getElementById('mainBtn').classList.toggle('ready', selectedIds.length > 0);
                } else {
                    handleJudge(opt.id, cleanAns, btn);
                }
            };
            btn.dataset.id = opt.id;
            container.appendChild(btn);
        });

        const mainBtn = document.getElementById('mainBtn');
        mainBtn.innerText = (typeText === "多選題") ? "確認送出答案" : "下一題";
        mainBtn.disabled = true;
        mainBtn.classList.remove('ready');
    }

    function handleJudge(userId, correctAns, btn) {
        clearInterval(qTimerInterval); // 答題即停止本題計時
        document.querySelectorAll('.opt-btn').forEach(b => b.onclick = null);
        const isCorrect = userId === correctAns;
        btn.classList.add(isCorrect ? 'correct' : 'wrong');
        if (!isCorrect) {
            document.querySelectorAll('.opt-btn').forEach(b => { if(b.dataset.id === correctAns) b.classList.add('correct'); });
            fetch(`${API_URL}?type=recordError&data=${encodeURIComponent(JSON.stringify(quizData[index]))}`);
        }
        showFeedback(isCorrect, correctAns);
        const mainBtn = document.getElementById('mainBtn');
        mainBtn.disabled = false; mainBtn.classList.add('ready');
    }

    async function handleAction() {
        const q = quizData[index];
        const cleanAns = q.ans.toString().replace(/，/g, ',').replace(/\s/g, '').toUpperCase();
        const mainBtn = document.getElementById('mainBtn');

        if (mainBtn.innerText === "確認送出答案") {
            clearInterval(qTimerInterval);
            const correctArr = cleanAns.split(",").sort();
            const userArr = selectedIds.sort();
            const isCorrect = JSON.stringify(correctArr) === JSON.stringify(userArr);

            document.querySelectorAll('.opt-btn').forEach(b => {
                b.onclick = null;
                if (correctArr.includes(b.dataset.id)) b.classList.add('correct');
                if (b.classList.contains('selected') && !correctArr.includes(b.dataset.id)) b.classList.add('wrong');
            });

            if (!isCorrect) {
                await fetch(`${API_URL}?type=recordError&data=${encodeURIComponent(JSON.stringify(q))}`);
            }
            showFeedback(isCorrect, cleanAns);
            mainBtn.innerText = "下一題";
        } else {
            index++; render();
        }
    }

    function showFeedback(isCorrect, ans) {
        const fb = document.getElementById('ansFeedback');
        fb.style.display = "block";
        fb.className = `feedback-box ${isCorrect ? 'fb-correct' : 'fb-wrong'}`;
        fb.innerText = isCorrect ? "✨ 正確！" : `❌ 錯誤。答案：${ans}`;
    }

    async function clearErrors() {
        if (confirm("確定清除錯題記錄？")) {
            await fetch(`${API_URL}?type=clearErrors`);
            alert("已清除！");
        }
    }
</script>
</body>
</html>
