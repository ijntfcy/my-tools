<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jexams Pro</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --success: #34C759; --danger: #FF3B30; --disabled: #AEAEB2; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        #loginPage { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; width: 100%; }
        .login-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; text-align: center; box-sizing: border-box; }
        input[type="password"] { width: 100%; padding: 15px; border: 2px solid #E5E5EA; border-radius: 12px; font-size: 18px; margin: 20px 0; box-sizing: border-box; text-align: center; outline: none; }
        .header-status { width: 100%; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .timer-badge { background: white; color: var(--primary); padding: 6px 14px; border-radius: 20px; font-weight: bold; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .menu-bar { display: flex; background: #E5E5EA; padding: 4px; border-radius: 12px; margin-bottom: 15px; overflow-x: auto; gap: 4px; width: 100%; }
        .menu-item { flex: 1; border: none; background: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; white-space: nowrap; }
        .menu-item.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; width: 100%; box-sizing: border-box; }
        .badge { background: #E8F0FE; color: var(--primary); font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .q-text { font-size: 1.25rem; font-weight: bold; line-height: 1.5; color: #1C1C1E; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .opt-btn { background: white; border: 2px solid #E5E5EA; border-radius: 15px; padding: 18px; text-align: left; cursor: pointer; font-size: 1.05rem; font-weight: 600; transition: 0.2s; outline: none; }
        .opt-btn.correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .opt-btn.wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }
        .action-btn { width: 100%; padding: 18px; border-radius: 18px; border: none; background: var(--disabled); color: white; font-size: 1.1rem; font-weight: bold; margin-top: 25px; cursor: pointer; }
        .action-btn.ready { background: var(--primary); box-shadow: 0 4px 12px rgba(0,122,255,0.3); }
        .feedback-box { margin-top: 20px; padding: 15px; border-radius: 12px; display: none; font-weight: bold; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<div id="loginPage">
    <div class="login-card">
        <h2>Jexams 登入</h2>
        <input type="password" id="pwdInput" placeholder="請輸入密碼" autofocus>
        <button class="action-btn ready" onclick="checkAuth()">開始測驗</button>
    </div>
</div>

<div id="mainApp" class="container" style="display:none;">
    <div id="sheetMenu" class="menu-bar"></div>
    <div class="header-status">
        <div id="info" style="font-size: 12px; color: #8E8E93;">載入中...</div>
        <div class="timer-badge">⏱️ 耗時：<span id="usedTimeDisp">0</span> 秒</div>
    </div>
    <div class="card">
        <span id="subject" class="badge">科目</span>
        <div id="qText" class="q-text">讀取中...</div>
        <div id="ansFeedback" class="feedback-box"></div>
    </div>
    <div id="options" class="options-grid"></div>
    <button id="mainBtn" class="action-btn" onclick="nextQuestion()" disabled>請選擇答案</button>
</div>

<script>
    const FIXED_URL = "https://script.google.com/macros/s/AKfycbwqJXMzDORmYWyyZQqgx5fKCTzpBc8vkfwbJpfPZpa-EgHPU0MY5Zh5CSsZbyfPcuEXKQ/exec";
    let quizData = [], index = 0, isProcessing = false, timer, usedTime = 0, userKey = sessionStorage.getItem('quiz_auth');

    async function fetchData(params) {
        try {
            const resp = await fetch(`${FIXED_URL}?pwd=${encodeURIComponent(userKey)}&t=${Date.now()}&${params}`);
            return await resp.json();
        } catch (e) { return {error: "連線失敗"}; }
    }

    async function checkAuth() {
        userKey = document.getElementById('pwdInput').value;
        const sheets = await fetchData('type=listSheets');
        if (sheets && !sheets.error) {
            sessionStorage.setItem('quiz_auth', userKey);
            loadApp(sheets);
        } else { alert("密碼錯誤"); }
    }

    window.onload = async () => {
        if (userKey) {
            const sheets = await fetchData('type=listSheets');
            if (sheets && !sheets.error) loadApp(sheets);
        }
    };

    async function loadApp(sheets) {
        document.getElementById('loginPage').style.display = "none";
        document.getElementById('mainApp').style.display = "block";
        const menu = document.getElementById('sheetMenu');
        const urlParams = new URLSearchParams(window.location.search);
        const curSheet = urlParams.get('sheet') || sheets[0];
        
        sheets.forEach(name => {
            const btn = document.createElement('button');
            btn.className = `menu-item ${name === curSheet ? 'active' : ''}`;
            btn.innerText = name;
            btn.onclick = () => location.search = `?sheet=${encodeURIComponent(name)}`;
            menu.appendChild(btn);
        });

        const raw = await fetchData(`sheet=${encodeURIComponent(curSheet)}`);
        if (raw && Array.isArray(raw)) {
            quizData = raw.sort(() => Math.random() - 0.5);
            render();
        }
    }

    function render() {
        if (index >= quizData.length) {
            clearInterval(timer);
            document.getElementById('qText').innerText = "🎉 測驗完成！";
            document.getElementById('options').innerHTML = "";
            document.getElementById('mainBtn').style.display = "none";
            return;
        }
        isProcessing = false;
        const q = quizData[index];
        document.getElementById('info').innerText = `題目：${index + 1} / ${quizData.length}`;
        document.getElementById('subject').innerText = q.subject;
        document.getElementById('qText').innerText = q.q;
        document.getElementById('ansFeedback').style.display = "none";
        
        const optContainer = document.getElementById('options');
        optContainer.innerHTML = "";
        q.opts.forEach((text, i) => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = `${i+1}. ${text}`;
            btn.onclick = () => judge(btn, (i+1).toString(), q.ans.toUpperCase());
            optContainer.appendChild(btn);
        });
        startTimer();
    }

    function startTimer() {
        clearInterval(timer);
        usedTime = 0;
        document.getElementById('usedTimeDisp').innerText = "0";
        timer = setInterval(() => {
            usedTime++;
            document.getElementById('usedTimeDisp').innerText = usedTime;
        }, 1000);
    }

    function judge(btn, choice, ans) {
        if (isProcessing) return;
        clearInterval(timer);
        isProcessing = true;
        const isRight = (choice === ans);
        btn.classList.add(isRight ? 'correct' : 'wrong');
        if (!isRight) {
            document.querySelectorAll('.opt-btn').forEach((b, i) => {
                if ((i + 1).toString() === ans) b.classList.add('correct');
            });
        }
        const fb = document.getElementById('ansFeedback');
        fb.style.display = "block";
        fb.style.background = isRight ? "#E8F5E9" : "#FFEBEE";
        fb.innerText = isRight ? `✨ 正確！(耗時：${usedTime}秒)` : `❌ 錯誤，正確答案是：${ans}\n(耗時：${usedTime}秒)`;
        document.getElementById('mainBtn').disabled = false;
        document.getElementById('mainBtn').innerText = "下一題";
        document.getElementById('mainBtn').classList.add('ready');
    }

    function nextQuestion() {
        index++;
        document.getElementById('mainBtn').disabled = true;
        document.getElementById('mainBtn').innerText = "請選擇答案";
        document.getElementById('mainBtn').classList.remove('ready');
        render();
    }
</script>
</body>
</html>
