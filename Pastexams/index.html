<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jexams 雲端測驗</title>
    <style>
        :root { --primary: #007AFF; --bg: #F2F2F7; --success: #34C759; --danger: #FF3B30; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        
        /* 選單樣式 */
        .menu-bar { display: flex; background: #E5E5EA; padding: 4px; border-radius: 12px; margin-bottom: 15px; }
        .menu-item { flex: 1; border: none; background: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .menu-item.active { background: white; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        /* 頂部美化開關列 */
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; width: 100%; }
        .controls { display: flex; gap: 10px; }
        
        /* 切換開關樣式 (Toggle Switch) */
        .switch { position: relative; display: inline-flex; align-items: center; cursor: pointer; font-size: 13px; font-weight: 600; color: #48484A; }
        .switch input { display: none; }
        .slider { width: 36px; height: 20px; background-color: #D1D1D6; border-radius: 20px; position: relative; transition: .3s; margin-right: 6px; }
        .slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(16px); }

        .clear-btn { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .clear-btn:active { opacity: 0.7; }

        /* 題目卡片 */
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; position: relative; }
        .badge { background: #E8F0FE; color: var(--primary); font-size: 11px; padding: 4px 10px; border-radius: 6px; font-weight: bold; }
        .q-text { font-size: 1.3rem; font-weight: bold; margin-top: 15px; line-height: 1.4; }
        
        .timer-row { display: flex; justify-content: space-between; font-size: 12px; color: #8E8E93; margin-bottom: 8px; padding: 0 5px; }

        /* 選項按鈕 */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .opt-btn { background: white; border: 1px solid #E5E5EA; border-radius: 12px; padding: 18px; text-align: left; cursor: pointer; font-size: 1.05rem; font-weight: 500; transition: 0.2s; }
        .opt-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .opt-btn.wrong { background: var(--danger); color: white; border-color: var(--danger); }
        
        .action-btn { width: 100%; padding: 20px; border-radius: 16px; border: none; background: #D1D1D6; color: white; font-size: 1.1rem; font-weight: bold; margin-top: 20px; cursor: pointer; transition: 0.3s; }
        .action-btn.ready { background: var(--primary); box-shadow: 0 4px 12px rgba(0,122,255,0.3); }

        .feedback { margin-top: 15px; padding: 15px; border-radius: 12px; display: none; font-weight: bold; font-size: 14px; text-align: center; }
        .fb-wrong { background: #FFEBEE; color: var(--danger); }
    </style>
</head>
<body>

<div class="container">
    <div id="sheetMenu" class="menu-bar"></div>
    
    <div class="top-row">
        <div class="controls">
            <label class="switch">
                <input type="checkbox" id="qRandom" checked onchange="initQuiz()">
                <span class="slider"></span> 題目隨機
            </label>
            <label class="switch">
                <input type="checkbox" id="optRandom" checked onchange="render()">
                <span class="slider"></span> 選項隨機
            </label>
        </div>
        <button class="clear-btn" onclick="clearErrors()">清除錯題記錄</button>
    </div>

    <div class="timer-row">
        <div id="progress">載入中...</div>
        <div id="timer">總計時: 00:00</div>
    </div>

    <div class="card">
        <span id="subject" class="badge">科目</span>
        <div id="qText" class="q-text">讀取中...</div>
        <div id="ansFeedback" class="feedback"></div>
    </div>

    <div id="options" class="options-grid"></div>
    <button id="mainBtn" class="action-btn" onclick="handleAction()" disabled>下一題</button>
</div>

<script>
    const API_URL = "您的GAS網址"; // <--- 請務必換成最新部署的網址！
    let rawData = [], quizData = [], index = 0;
    let totalSec = 0, currentSheet = new URLSearchParams(window.location.search).get('sheet');

    window.onload = async () => {
        const listResp = await fetch(`${API_URL}?type=listSheets`);
        const sheetNames = await listResp.json();
        const menu = document.getElementById('sheetMenu');
        if (!currentSheet) currentSheet = sheetNames[0];
        sheetNames.forEach(name => {
            const btn = document.createElement('button');
            btn.className = `menu-item ${name === currentSheet ? 'active' : ''}`;
            btn.innerText = name;
            btn.onclick = () => window.location.search = `?sheet=${encodeURIComponent(name)}`;
            menu.appendChild(btn);
        });

        const resp = await fetch(`${API_URL}?sheet=${currentSheet}`);
        rawData = await resp.json();
        setInterval(() => {
            totalSec++;
            document.getElementById('timer').innerText = `總計時: ${Math.floor(totalSec/60).toString().padStart(2,'0')}:${(totalSec%60).toString().padStart(2,'0')}`;
        }, 1000);
        initQuiz();
    };

    function initQuiz() {
        quizData = document.getElementById('qRandom').checked ? [...rawData].sort(() => Math.random() - 0.5) : [...rawData];
        index = 0; render();
    }

    function render() {
        if (index >= quizData.length) { 
            document.getElementById('qText').innerText = "測驗完成！"; 
            document.getElementById('options').innerHTML = ""; return; 
        }
        const q = quizData[index];
        document.getElementById('progress').innerText = `第 ${index+1} / ${quizData.length} 題`;
        document.getElementById('subject').innerText = q.subject;
        document.getElementById('qText').innerText = q.q;
        document.getElementById('ansFeedback').style.display = "none";
        const container = document.getElementById('options');
        container.innerHTML = "";
        let opts = (q.opts.length > 0 ? q.opts : ["O", "X"]).map((t, i) => ({ text: t, id: (q.ans=="O"||q.ans=="X")? t : (i+1).toString() }));
        if (document.getElementById('optRandom').checked) opts.sort(() => Math.random() - 0.5);
        opts.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = opt.text;
            btn.onclick = () => handleSelect(btn, opt.id, q.ans);
            btn.dataset.id = opt.id;
            container.appendChild(btn);
        });
        const mainBtn = document.getElementById('mainBtn');
        mainBtn.disabled = true; mainBtn.classList.remove('ready');
    }

    async function handleSelect(btn, id, ans) {
        if (!ans.includes(",")) { // 單選邏輯
            const isCorrect = id === ans;
            document.querySelectorAll('.opt-btn').forEach(b => b.onclick = null); // 防止重選
            btn.classList.add(isCorrect ? 'correct' : 'wrong');
            if (!isCorrect) {
                document.querySelectorAll('.opt-btn').forEach(b => { if(b.dataset.id === ans) b.classList.add('correct'); });
                const feedback = document.getElementById('ansFeedback');
                feedback.style.display = "block"; feedback.className = "feedback fb-wrong";
                feedback.innerText = `❌ 答錯了。正確答案：${ans}`;
                // 記錄錯題到 Excel
                fetch(`${API_URL}?type=recordError&data=${encodeURIComponent(JSON.stringify(quizData[index]))}`);
            }
            document.getElementById('mainBtn').disabled = false;
            document.getElementById('mainBtn').classList.add('ready');
        }
    }

    function handleAction() { index++; render(); }

    async function clearErrors() {
        if (confirm("確定要清除所有錯題記錄嗎？")) {
            await fetch(`${API_URL}?type=clearErrors`);
            alert("錯題記錄已清除！");
        }
    }
</script>
</body>
</html>
